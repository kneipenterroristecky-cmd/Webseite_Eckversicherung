name: Test – WhatsApp-Bilder senden

on:
  workflow_dispatch:

jobs:
  whatsapp-test:
    name: Aktuelle Social-Bilder per WhatsApp senden
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: WhatsApp-Bilder senden
        env:
          WA_PHONE_ID:   ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_TOKEN:      ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:         ${{ secrets.WHATSAPP_TO_NUMBER }}
          SITE_URL:      ${{ secrets.SITE_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, requests as req

          token    = os.environ.get("WA_TOKEN", "")
          phone_id = os.environ.get("WA_PHONE_ID", "")
          wa_to    = os.environ.get("WA_TO", "")
          site_url = os.environ.get("SITE_URL", "").rstrip("/")

          msg_api = f"https://graph.facebook.com/v19.0/{phone_id}/messages"
          auth    = {"Authorization": f"Bearer {token}"}

          def send_bild(image_url, label):
            r = req.post(msg_api, headers={**auth, "Content-Type":"application/json"}, json={
              "messaging_product": "whatsapp",
              "to": wa_to,
              "type": "template",
              "template": {
                "name": "blog_bild",
                "language": {"code": "de"},
                "components": [{
                  "type": "header",
                  "parameters": [{"type": "image", "image": {"link": image_url}}]
                }]
              }
            })
            print(f"WA Bild {label}: {r.status_code}")
            if r.status_code >= 300:
              print(f"  ❌ {r.text[:400]}")

          send_bild(f"{site_url}/social/latest-ig.png",       "Daniel")
          send_bild(f"{site_url}/social/latest-ig-heiko.png", "Heiko")
          send_bild(f"{site_url}/social/latest-ig-beide.png", "Beide")
          PYEOF
