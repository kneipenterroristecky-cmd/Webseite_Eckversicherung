name: 3 – Änderung am Blog-Entwurf beantragen

on:
  workflow_dispatch:
    inputs:
      new_topic:
        description: 'Komplett neues Thema generieren (z.B. "Hausratversicherung: Was wirklich versichert ist"). Leer = Thema bleibt.'
        required: false
        default: ''
      new_unsplash_id:
        description: 'Neues Bild – Unsplash Foto-ID (z.B. photo-1552664730-d307ca884978). Leer = kein Bildwechsel.'
        required: false
        default: ''
      new_title:
        description: 'Neuer Beitragstitel. Leer = Titel bleibt.'
        required: false
        default: ''
      new_summary:
        description: 'Neuer Facebook/Instagram-Text. Leer = Text bleibt.'
        required: false
        default: ''
      suggest_new_image:
        description: 'Automatisch ein neues passendes Bild vorschlagen (überschreibt Foto-ID oben)'
        required: false
        type: boolean
        default: false

jobs:
  aendern:
    name: Entwurf anpassen und neu rendern
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests playwright pillow anthropic

      - name: Neues Thema generieren
        if: ${{ inputs.new_topic != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          FORCE_TOPIC: ${{ inputs.new_topic }}
        run: |
          playwright install chromium --with-deps
          python tools/generate_post.py
          python tools/generate_social_image.py

      - name: Änderungen anwenden
        if: ${{ inputs.new_topic == '' }}
        env:
          NEW_UNSPLASH_ID: ${{ inputs.new_unsplash_id }}
          NEW_TITLE: ${{ inputs.new_title }}
          NEW_SUMMARY: ${{ inputs.new_summary }}
          SUGGEST_IMAGE: ${{ inputs.suggest_new_image }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, requests as req
          sys.path.insert(0, 'tools')
          from image_search import find_best_image
          if not os.path.exists('tools/draft_meta.json'):
            print("Kein Entwurf gefunden – zuerst Workflow 1 ausfuehren.")
            sys.exit(1)
          meta = json.load(open('tools/draft_meta.json', encoding='utf-8'))
          html_path = f"blog/posts/{meta['filename']}"
          blog_html = open(html_path, encoding='utf-8').read()
          changed = []
          new_id       = os.environ.get('NEW_UNSPLASH_ID', '').strip()
          new_title    = os.environ.get('NEW_TITLE', '').strip()
          new_summary  = os.environ.get('NEW_SUMMARY', '').strip()
          suggest      = os.environ.get('SUGGEST_IMAGE', '').lower() == 'true'
          unsplash_key = os.environ.get('UNSPLASH_ACCESS_KEY', '').strip()
          anthropic_key_img = os.environ.get('ANTHROPIC_API_KEY', '').strip()
          if suggest and not new_id:
            if not unsplash_key or not anthropic_key_img:
              print("⚠️  UNSPLASH_ACCESS_KEY oder ANTHROPIC_API_KEY nicht gesetzt – Bildvorschlag uebersprungen.")
            else:
              try:
                import anthropic as ac
                img_client = ac.Anthropic(api_key=anthropic_key_img)
                # Aktuellen Titel (ggf. neuer Titel aus diesem Lauf) als Suchgrundlage nehmen,
                # nicht die veraltete unsplash_query aus dem urspruenglichen Entwurf.
                topic_title = new_title or meta.get('title', '')
                fallback = meta.get('og_image') or "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=1200&h=630&fit=crop&auto=format"
                new_id = find_best_image(
                  topic_title, meta.get('label', 'Ratgeber'),
                  meta.get('unsplash_query', topic_title),
                  img_client, fallback, unsplash_key
                )
              except Exception as e:
                print(f"⚠️  Bildauswahl-Fehler: {e}")
          if new_id:
            new_url = new_id if new_id.startswith('https://') else f"https://images.unsplash.com/{new_id}?w=1200&h=630&fit=crop&auto=format"
            meta['og_image'] = new_url
            blog_html = re.sub(
              r'<meta property="og:image" content="[^"]*"',
              f'<meta property="og:image" content="{new_url}"', blog_html)
            blog_html = re.sub(
              r'<img([^>]*?)src="[^"]*"([^>]*?)class="blog-hero-img"',
              f'<img\\1src="{new_url}"\\2class="blog-hero-img"', blog_html)
            ig_url = re.sub(r'w=\d+&h=\d+', 'w=1080&h=1920', new_url)
            for sf in ['social/latest-ig.html', 'social/latest-ig-heiko.html', 'social/latest-ig-beide.html']:
              if os.path.exists(sf):
                s = open(sf, encoding='utf-8').read()
                s = re.sub(r'(<img class="bg-img" src=")[^"]+(")', fr'\g<1>{ig_url}\g<2>', s)
                open(sf, 'w', encoding='utf-8').write(s)
            changed.append("Bild aktualisiert")
          if new_title:
            old = meta['title']
            meta['title'] = new_title
            blog_html = re.sub(
              r'<meta property="og:title" content="[^"]*"',
              f'<meta property="og:title" content="{new_title}"', blog_html)
            blog_html = re.sub(r'<title>[^<]*</title>',
              f'<title>{new_title} | Daniel Eck - Versicherungsmakler</title>', blog_html)
            blog_html = blog_html.replace(f'>{old}<', f'>{new_title}<', 2)
            h1_html = f'<h1>{new_title}</h1>'
            anthropic_key = os.environ.get('ANTHROPIC_API_KEY', '').strip()
            if anthropic_key:
              try:
                import anthropic as ac
                client = ac.Anthropic(api_key=anthropic_key)
                msg = client.messages.create(
                  model="claude-haiku-4-5-20251001",
                  max_tokens=150,
                  messages=[{"role": "user", "content":
                    f'Formatiere diesen Blog-Titel als HTML h1 fuer ein Instagram-Bild. '
                    f'Titel: "{new_title}". '
                    f'Waehle das wichtigste Hauptwort (1-2 Woerter) und umschliesse es mit <span>. '
                    f'Setze sinnvolle <br>-Umbrueche (max 3 Zeilen, je ~3-4 Woerter). '
                    f'Antworte NUR mit dem h1-Tag. Beispiel: <h1>Fuer Ihre<br><span>Familie</span><br>abgesichert</h1>'}]
                )
                h1_html = msg.content[0].text.strip()
                print(f"h1 generiert: {h1_html}")
              except Exception as e:
                print(f"⚠️ h1-Formatierung fehlgeschlagen: {e}")
            for sf in ['social/latest-ig.html', 'social/latest-ig-heiko.html', 'social/latest-ig-beide.html']:
              if os.path.exists(sf):
                s = open(sf, encoding='utf-8').read()
                s = re.sub(r'<h1>.*?</h1>', h1_html, s, flags=re.DOTALL)
                open(sf, 'w', encoding='utf-8').write(s)
            changed.append(f"Titel -> {new_title}")
          if new_summary:
            meta['social_summary'] = new_summary
            meta['instagram_caption'] = new_summary
            changed.append("Social-Text aktualisiert")
          open(html_path, 'w', encoding='utf-8').write(blog_html)
          json.dump(meta, open('tools/draft_meta.json', 'w', encoding='utf-8'),
            ensure_ascii=False, indent=2)
          print("Aenderungen:", ', '.join(changed) if changed else "keine")
          PYEOF

      - name: Playwright Chromium installieren
        if: ${{ inputs.new_topic == '' && (inputs.new_unsplash_id != '' || inputs.suggest_new_image == true || inputs.new_title != '') }}
        run: playwright install chromium --with-deps

      - name: Social-Bild neu rendern
        if: ${{ inputs.new_topic == '' && (inputs.new_unsplash_id != '' || inputs.suggest_new_image == true || inputs.new_title != '') }}
        run: python tools/generate_social_image.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git stash --include-untracked
            STASHED=1
          else
            STASHED=0
          fi
          git pull --rebase origin master
          if [ "$STASHED" -eq 1 ]; then
            git stash pop
          fi
          git add blog/posts/ tools/draft_meta.json social/
          TITLE=$(python3 -c "import json; print(json.load(open('tools/draft_meta.json'))['title'])")
          git diff --staged --quiet || git commit -m "Entwurf geaendert: $TITLE"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push-Versuch $i fehlgeschlagen, warte 15 Sekunden..."
            sleep 15
          done

      - name: Metadaten und Issue-URL vorbereiten
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          m = json.load(open('tools/draft_meta.json', encoding='utf-8'))
          summary = m.get('social_summary', '')[:300].replace('\n', ' ')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"POST_TITLE={m['title']}\n")
              f.write(f"POST_DATE={m.get('date_de', '')}\n")
              f.write(f"POST_SUMMARY={summary}\n")
          PYEOF
          ISSUE_NUM=$(gh issue list --state open --json number,title \
            --jq '[.[] | select(.title | startswith("📝 Blog-Entwurf"))] | .[0].number' 2>/dev/null || echo "")
          if [ -n "$ISSUE_NUM" ] && [ "$ISSUE_NUM" != "null" ]; then
            echo "ISSUE_URL=https://github.com/${GITHUB_REPOSITORY}/issues/${ISSUE_NUM}" >> $GITHUB_ENV
            echo "ISSUE_NUM=$ISSUE_NUM" >> $GITHUB_ENV
          else
            echo "ISSUE_URL=https://github.com/${GITHUB_REPOSITORY}/issues" >> $GITHUB_ENV
            echo "ISSUE_NUM=" >> $GITHUB_ENV
          fi
          echo "APPROVE_URL=https://github.com/${GITHUB_REPOSITORY}/actions/workflows/publish-blog-post.yml" >> $GITHUB_ENV
          echo "CHANGE_URL=https://github.com/${GITHUB_REPOSITORY}/actions/workflows/request-changes.yml" >> $GITHUB_ENV

      - name: Issue-Kommentar mit Änderungsprotokoll
        if: ${{ env.ISSUE_NUM != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=""
          [ -n "${{ inputs.new_unsplash_id }}" ] && CHANGED="$CHANGED\n- 🖼️ Bild geändert: \`${{ inputs.new_unsplash_id }}\`"
          [ -n "${{ inputs.new_title }}" ]       && CHANGED="$CHANGED\n- 📝 Titel: ${{ inputs.new_title }}"
          [ -n "${{ inputs.new_summary }}" ]     && CHANGED="$CHANGED\n- 💬 Social-Text aktualisiert"
          printf "✏️ **Entwurf angepasst:**%b\n\n📬 Neue Vorschau-E-Mail wurde gesendet." "$CHANGED" \
            | gh issue comment "$ISSUE_NUM" --body-file -

      - name: Aktualisierte Vorschau-E-Mail senden
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, html as hl, requests as req, json, re, io, base64 as b64m
          from PIL import Image

          def thumb(path, w=240, h=427):
            try:
              img = Image.open(path).convert("RGB")
              img = img.resize((w, h), Image.Resampling.LANCZOS)
              buf = io.BytesIO()
              img.save(buf, "JPEG", quality=55, optimize=True)
              data = b64m.b64encode(buf.getvalue()).decode()
              print(f"Thumbnail {path}: {len(data)//1024}KB (base64)")
              return "data:image/jpeg;base64," + data
            except Exception as e:
              print(f"Thumbnail-Fehler {path}: {e}")
              return ""

          meta        = json.load(open("tools/draft_meta.json", encoding="utf-8"))
          title       = meta.get("title", "")
          date_de     = meta.get("date_de", "")
          fb_text     = meta.get("social_summary", "")
          ig_text     = meta.get("instagram_caption", "")
          repo        = os.environ.get("GITHUB_REPOSITORY", "")
          approve_url = f"https://github.com/{repo}/actions/workflows/publish-blog-post.yml"
          change_url  = f"https://github.com/{repo}/actions/workflows/request-changes.yml"
          api_key     = os.environ.get("BREVO_API_KEY", "").strip()
          d_src = thumb("social/latest-ig.png", 140, 249)
          h_src = thumb("social/latest-ig-heiko.png", 140, 249)
          b_src = thumb("social/latest-ig-beide.png", 140, 249)
          excerpt = ""
          try:
            raw = open(f"blog/posts/{meta['filename']}", encoding="utf-8").read()
            m = re.search(r'<div class="blog-content">(.*?)</div>\s*<div class="blog-author', raw, re.DOTALL)
            if m:
              text = re.sub(r'<[^>]+>', ' ', m.group(1))
              text = re.sub(r'\s+', ' ', text).strip()
              excerpt = hl.escape(text)
          except Exception:
            pass
          t  = hl.escape(title)
          d  = hl.escape(date_de)
          fb = hl.escape(fb_text)
          ig = hl.escape(ig_text).replace("\n", "<br>")
          img_d = f'<img src="{d_src}" width="140" height="249" style="display:block;border-radius:5px">' if d_src else '<table width="140" height="249" cellpadding="0" cellspacing="0"><tr><td style="background:#cbd5e1;border-radius:5px;text-align:center;vertical-align:middle;font-family:Arial,sans-serif;font-size:11px;color:#94a3b8">Bild</td></tr></table>'
          img_h = f'<img src="{h_src}" width="140" height="249" style="display:block;border-radius:5px">' if h_src else '<table width="140" height="249" cellpadding="0" cellspacing="0"><tr><td style="background:#cbd5e1;border-radius:5px;text-align:center;vertical-align:middle;font-family:Arial,sans-serif;font-size:11px;color:#94a3b8">Bild</td></tr></table>'
          img_b = f'<img src="{b_src}" width="140" height="249" style="display:block;border-radius:5px">' if b_src else '<table width="140" height="249" cellpadding="0" cellspacing="0"><tr><td style="background:#cbd5e1;border-radius:5px;text-align:center;vertical-align:middle;font-family:Arial,sans-serif;font-size:11px;color:#94a3b8">Bild</td></tr></table>'
          body = (
            '<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f1f5f9" border="0"><tr><td align="center" style="padding:16px 8px">'
            '<table width="500" align="center" cellpadding="0" cellspacing="0" border="0">'
            # Header
            '<tr><td width="500" bgcolor="#d97706" style="padding:16px 18px;border-radius:10px 10px 0 0">'
            '<p style="color:rgba(255,255,255,.65);margin:0 0 3px;font-family:Arial,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px">Aktualisierter Entwurf</p>'
            f'<p style="color:#ffffff;margin:0 0 2px;font-family:Arial,sans-serif;font-size:15px;font-weight:800;line-height:1.35;word-break:break-word">{t}</p>'
            f'<p style="color:rgba(255,255,255,.5);margin:0;font-family:Arial,sans-serif;font-size:11px">{d}</p>'
            '</td></tr>'
            # Buttons oben
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px 12px;border-top:3px solid #f1f5f9">'
            f'<a href="{approve_url}" style="display:block;background:#16a34a;color:#ffffff;text-align:center;padding:12px 16px;border-radius:6px;text-decoration:none;font-family:Arial,sans-serif;font-size:14px;font-weight:700;margin-bottom:7px">&#9989; Freigeben &amp; ver&ouml;ffentlichen</a>'
            f'<a href="{change_url}" style="display:block;background:#f59e0b;color:#ffffff;text-align:center;padding:12px 16px;border-radius:6px;text-decoration:none;font-family:Arial,sans-serif;font-size:14px;font-weight:700">&#9999;&#65039; Nochmal &auml;ndern</a>'
            '</td></tr>'
            # Bilder nebeneinander
            '<tr><td width="500" bgcolor="#ffffff" style="padding:12px 14px 14px;border-top:3px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px">WhatsApp-Bilder</p>'
            '<table cellpadding="0" cellspacing="0" border="0"><tr>'
            '<td valign="top" style="padding-right:10px">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;color:#94a3b8;margin:0 0 4px;font-weight:600;text-align:center">Daniel</p>'
            f'{img_d}</td>'
            '<td valign="top">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;color:#94a3b8;margin:0 0 4px;font-weight:600;text-align:center">Heiko</p>'
            f'{img_h}</td>'
            '<td valign="top" style="padding-left:10px">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;color:#94a3b8;margin:0 0 4px;font-weight:600;text-align:center">Beide</p>'
            f'{img_b}</td>'
            '</tr></table>'
            '</td></tr>'
            # Beitrags-Auszug
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px;border-top:3px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 6px">Beitrags-Auszug</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#374151;line-height:1.55;margin:0;word-break:break-word">{excerpt}</p>'
            '</td></tr>'
            # Facebook
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px;border-top:3px solid #f1f5f9;word-break:break-word">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 6px">&#128216; Facebook</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#1e3a5f;line-height:1.55;background:#eff6ff;padding:9px 11px;border-radius:5px;border-left:3px solid #3b82f6;margin:0;word-break:break-word">{fb}</p>'
            '</td></tr>'
            # Instagram
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px;border-top:3px solid #f1f5f9;word-break:break-word">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 6px">&#128248; Instagram</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#374151;line-height:1.55;background:#fefce8;padding:9px 11px;border-radius:5px;border-left:3px solid #eab308;margin:0;word-break:break-word">{ig}</p>'
            '</td></tr>'
            '</table>'
            '</td></tr></table>'
          )
          print(f"E-Mail Body: {len(body)//1024}KB")
          payload = {
            "sender": {"name": "Daniel Eck Webseite", "email": "kneipenterroristecky@googlemail.com"},
            "to": [{"email": "daniel@eckversicherung.de", "name": "Daniel Eck"}],
            "subject": f"✏️ Entwurf aktualisiert: {title}",
            "htmlContent": body
          }
          r = req.post("https://api.brevo.com/v3/smtp/email",
            headers={"api-key": api_key, "Content-Type": "application/json"},
            json=payload)
          print(f"E-Mail Status: {r.status_code}")
          if r.status_code >= 300:
            print(f"Fehler: {r.text[:500]}")
          PYEOF
