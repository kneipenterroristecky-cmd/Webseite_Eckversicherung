name: Einmalig – WhatsApp Template prüfen / erstellen

on:
  workflow_dispatch:

jobs:
  create-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Templates prüfen und bei Bedarf erstellen
        env:
          WA_TOKEN:    ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          SITE_URL:    ${{ secrets.SITE_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, requests

          token    = os.environ["WA_TOKEN"]
          site_url = os.environ.get("SITE_URL", "").rstrip("/")
          headers  = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          waba_id  = "984626847600060"

          # Bestehende Templates abrufen
          r = requests.get(
            f"https://graph.facebook.com/v19.0/{waba_id}/message_templates",
            headers=headers,
            params={"fields": "name,status,language"}
          )
          templates = {t["name"]: t for t in r.json().get("data", [])}

          print("Alle Templates im Account:")
          for name, t in templates.items():
            print(f"  - {name}: {t.get('status','?')} ({t.get('language','?')})")

          # blog_benachrichtigung (Text-Template, Fallback)
          if "blog_benachrichtigung" in templates:
            st = templates["blog_benachrichtigung"].get("status","?")
            print(f"\n✅ blog_benachrichtigung: {st}")
          else:
            print("\n⚠️  blog_benachrichtigung fehlt – wird erstellt …")
            requests.post(
              f"https://graph.facebook.com/v19.0/{waba_id}/message_templates",
              headers=headers,
              json={
                "name": "blog_benachrichtigung",
                "language": "de",
                "category": "UTILITY",
                "components": [{"type":"BODY","text":"✅ Blog-Beitrag veröffentlicht! Die Social-Media-Bilder folgen sofort."}]
              }
            )

          # blog_bild_v2 (Bild-Template – das eigentliche Haupt-Template)
          if "blog_bild_v2" in templates:
            st = templates["blog_bild_v2"].get("status","?")
            print(f"✅ blog_bild_v2: {st}")
            if st == "APPROVED":
              print("   → Perfekt! WF2 und WF4 senden die 3 Bilder per Template.")
            elif st == "PENDING":
              print("   → Noch in Prüfung. Bitte in 1-2 Stunden erneut prüfen.")
            elif st == "REJECTED":
              print("   → Abgelehnt! Wird gelöscht und neu erstellt …")
              requests.delete(
                f"https://graph.facebook.com/v19.0/{waba_id}/message_templates",
                headers=headers, params={"name": "blog_bild_v2"}
              )
              templates.pop("blog_bild_v2")

          if "blog_bild_v2" not in templates:
            import time
            print("\n⚠️  blog_bild_v2 fehlt – warte 30s auf Meta-Backend, dann erstellen …")
            time.sleep(30)

            # Schritt 1: Beispielbild von der öffentlichen Website holen
            sample_url = f"{site_url}/social/latest-ig.png"
            print(f"  Lade Beispielbild: {sample_url}")
            img_r = requests.get(sample_url, timeout=30, headers={"User-Agent": "Mozilla/5.0"})
            if not img_r.ok:
              print(f"  ❌ Bild-Download fehlgeschlagen: {img_r.status_code}")
            else:
              img_bytes = img_r.content
              print(f"  Bild: {len(img_bytes)//1024} KB")

              # Schritt 2: Upload-Session bei Facebook eröffnen
              r_session = requests.post(
                "https://graph.facebook.com/v19.0/app/uploads",
                headers={"Authorization": f"Bearer {token}"},
                params={"file_length": len(img_bytes), "file_type": "image/png"}
              )
              print(f"  Upload-Session: {r_session.status_code} – {r_session.text[:200]}")
              upload_id = r_session.json().get("id")

              handle = None
              if upload_id:
                # Schritt 3: Bild hochladen und Handle bekommen
                r_upload = requests.post(
                  f"https://graph.facebook.com/v19.0/{upload_id}",
                  headers={
                    "Authorization": f"Bearer {token}",
                    "file_offset": "0",
                    "Content-Type": "image/png"
                  },
                  data=img_bytes
                )
                print(f"  Bild-Upload: {r_upload.status_code} – {r_upload.text[:200]}")
                handle = r_upload.json().get("h")

              if handle:
                print(f"  ✅ Handle: {handle[:60]}…")
                # Schritt 4: Template mit Handle erstellen
                payload = {
                  "name": "blog_bild_v2",
                  "language": "de",
                  "category": "UTILITY",
                  "components": [
                    {
                      "type": "HEADER",
                      "format": "IMAGE",
                      "example": {"header_handle": [handle]}
                    },
                    {
                      "type": "BODY",
                      "text": "."
                    }
                  ]
                }
                r2 = requests.post(
                  f"https://graph.facebook.com/v19.0/{waba_id}/message_templates",
                  headers=headers, json=payload
                )
                print(f"blog_bild_v2 erstellt: {r2.status_code} – {r2.text[:300]}")
                if r2.status_code < 300:
                  print("   → Eingereicht. Bitte in 1-2 Stunden Status prüfen (diesen Workflow erneut starten).")
                else:
                  print("   → Fehler bei Template-Erstellung!")
              else:
                print("  ❌ Kein Handle erhalten – Template kann nicht erstellt werden.")
          PYEOF
