name: Einmalig – WhatsApp Template prüfen / erstellen

on:
  workflow_dispatch:

jobs:
  create-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Templates prüfen und bei Bedarf erstellen
        env:
          WA_TOKEN:    ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          SITE_URL:    ${{ secrets.SITE_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, requests

          token    = os.environ["WA_TOKEN"]
          site_url = os.environ.get("SITE_URL", "").rstrip("/")
          headers  = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          waba_id  = "984626847600060"

          # Bestehende Templates abrufen
          r = requests.get(
            f"https://graph.facebook.com/v19.0/{waba_id}/message_templates",
            headers=headers,
            params={"fields": "name,status,language"}
          )
          templates = {t["name"]: t for t in r.json().get("data", [])}

          print("Alle Templates im Account:")
          for name, t in templates.items():
            print(f"  - {name}: {t.get('status','?')} ({t.get('language','?')})")

          # blog_benachrichtigung (Text-Template, Fallback)
          if "blog_benachrichtigung" in templates:
            st = templates["blog_benachrichtigung"].get("status","?")
            print(f"\n✅ blog_benachrichtigung: {st}")
          else:
            print("\n⚠️  blog_benachrichtigung fehlt – wird erstellt …")
            requests.post(
              f"https://graph.facebook.com/v19.0/{waba_id}/message_templates",
              headers=headers,
              json={
                "name": "blog_benachrichtigung",
                "language": "de",
                "category": "UTILITY",
                "components": [{"type":"BODY","text":"✅ Blog-Beitrag veröffentlicht! Die Social-Media-Bilder folgen sofort."}]
              }
            )

          # blog_bild (Bild-Template – das eigentliche Haupt-Template)
          if "blog_bild" in templates:
            st = templates["blog_bild"].get("status","?")
            print(f"✅ blog_bild: {st}")
            if st == "APPROVED":
              print("   → Perfekt! Workflow 2 sendet die 3 Bilder direkt als Templates.")
            elif st == "PENDING":
              print("   → Noch in Prüfung. Bitte in 1-2 Stunden erneut prüfen.")
            elif st == "REJECTED":
              print("   → Abgelehnt! Wird gelöscht und neu erstellt …")
              tid = templates["blog_bild"].get("id")
              if tid:
                requests.delete(f"https://graph.facebook.com/v19.0/{tid}", headers=headers)
              templates.pop("blog_bild")

          if "blog_bild" not in templates:
            print("\n⚠️  blog_bild fehlt – wird erstellt …")
            payload = {
              "name": "blog_bild",
              "language": "de",
              "category": "UTILITY",
              "components": [
                {
                  "type": "HEADER",
                  "format": "IMAGE"
                },
                {
                  "type": "BODY",
                  "text": "✅ Blog-Beitrag veröffentlicht! Social-Media-Bild zur Kontrolle."
                }
              ]
            }
            r2 = requests.post(
              f"https://graph.facebook.com/v19.0/{waba_id}/message_templates",
              headers=headers, json=payload
            )
            print(f"blog_bild erstellt: {r2.status_code} – {r2.text[:300]}")
            if r2.status_code < 300:
              print("   → Eingereicht. Bitte in 1-2 Stunden Status prüfen (diesen Workflow erneut starten).")
            else:
              print("   → Fehler! Bitte Log an Daniel schicken.")
          PYEOF
