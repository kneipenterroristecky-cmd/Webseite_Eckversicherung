name: 2 – Blog veröffentlichen (manuell nach Freigabe)

on:
  workflow_dispatch:   # Nur manuell – Sie starten das nach der E-Mail

jobs:
  veroeffentlichen:
    name: Auf Webseite, Facebook & Instagram veröffentlichen
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Überall veröffentlichen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/publish_post.py

      - name: WhatsApp-Benachrichtigung nach Veröffentlichung
        env:
          WA_PHONE_ID:   ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_APP_ID:     ${{ secrets.WHATSAPP_APP_ID }}
          WA_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WA_TOKEN:      ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:         ${{ secrets.WHATSAPP_TO_NUMBER }}
          SITE_URL:      ${{ secrets.SITE_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, json, requests as req

          token    = os.environ.get("WA_TOKEN", "")
          app_id   = os.environ.get("WA_APP_ID", "")
          app_sec  = os.environ.get("WA_APP_SECRET", "")
          phone_id = os.environ.get("WA_PHONE_ID", "")
          wa_to    = os.environ.get("WA_TO", "")
          site_url = os.environ.get("SITE_URL", "")

          if token and app_id and app_sec:
            try:
              r = req.get("https://graph.facebook.com/v19.0/oauth/access_token",
                params={"grant_type":"fb_exchange_token","client_id":app_id,
                        "client_secret":app_sec,"fb_exchange_token":token}, timeout=15)
              fresh = r.json().get("access_token","")
              if fresh:
                token = fresh
                print("✅ Token verlängert")
            except Exception as e:
              print(f"⚠️  Token-Fehler: {e}")

          with open("tools/draft_meta.json", encoding="utf-8") as f:
            meta = json.load(f)
          caption  = meta.get("instagram_caption", "")
          post_url = meta.get("post_url", site_url)

          media_api = f"https://graph.facebook.com/v19.0/{phone_id}/media"
          msg_api   = f"https://graph.facebook.com/v19.0/{phone_id}/messages"
          auth      = {"Authorization": f"Bearer {token}"}

          def upload(path):
            with open(path, "rb") as f:
              r = req.post(media_api, headers=auth,
                data={"messaging_product": "whatsapp"},
                files={"file": (os.path.basename(path), f, "image/png")})
            print(f"Upload {path}: {r.status_code}")
            if r.status_code >= 300:
              print(f"  ❌ {r.text[:400]}")
              return None
            return r.json().get("id")

          def send(payload):
            r = req.post(msg_api, headers={**auth, "Content-Type":"application/json"}, json=payload)
            print(f"WA send {payload['type']}: {r.status_code}")
            if r.status_code >= 300:
              print(f"  ❌ {r.text[:400]}")

          mid_d = upload("social/latest-ig.png")
          mid_h = upload("social/latest-ig-heiko.png")

          if mid_d:
            send({"messaging_product":"whatsapp","to":wa_to,"type":"image",
                  "image":{"id":mid_d,"caption":caption}})
          if mid_h:
            send({"messaging_product":"whatsapp","to":wa_to,"type":"image",
                  "image":{"id":mid_h,"caption":caption}})
          PYEOF
