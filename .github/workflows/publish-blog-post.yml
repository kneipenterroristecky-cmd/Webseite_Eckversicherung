name: 2 – Blog veröffentlichen (manuell nach Freigabe)

on:
  workflow_dispatch:   # Nur manuell – Sie starten das nach der E-Mail

jobs:
  veroeffentlichen:
    name: Auf Webseite, Facebook & Instagram veröffentlichen
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Überall veröffentlichen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/publish_post.py

      - name: WhatsApp-Benachrichtigung nach Veröffentlichung
        env:
          WA_PHONE_ID:   ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_APP_ID:     ${{ secrets.WHATSAPP_APP_ID }}
          WA_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WA_TOKEN:      ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:         ${{ secrets.WHATSAPP_TO_NUMBER }}
          SITE_URL:      ${{ secrets.SITE_URL }}
        run: |
          # Token verlängern
          ACTIVE_TOKEN="$WA_TOKEN"
          if [ -n "$WA_TOKEN" ] && [ -n "$WA_APP_ID" ] && [ -n "$WA_APP_SECRET" ]; then
            FRESH=$(curl -s "https://graph.facebook.com/v19.0/oauth/access_token?grant_type=fb_exchange_token&client_id=${WA_APP_ID}&client_secret=${WA_APP_SECRET}&fb_exchange_token=${WA_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null || echo "")
            [ -n "$FRESH" ] && ACTIVE_TOKEN="$FRESH"
          fi

          RAW_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/master/social"
          POST_URL=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m.get('post_url',''))" 2>/dev/null || echo "$SITE_URL")

          send_wa() {
            RESP=$(curl -s -X POST "https://graph.facebook.com/v19.0/${WA_PHONE_ID}/messages" \
              -H "Authorization: Bearer $ACTIVE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$1")
            echo "$RESP"
            echo "$RESP" | grep -q '"error"' && echo "⚠️  WhatsApp-Fehler: $RESP" || true
          }

          INSTA=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m.get('instagram_caption',''))" | tr -d '\n\r' | sed 's/"/\\"/g')

          # Daniel-Bild
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"image\",\"image\":{\"link\":\"${RAW_BASE}/latest-ig.png\",\"caption\":\"$INSTA\"}}"
          # Heiko-Bild
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"image\",\"image\":{\"link\":\"${RAW_BASE}/latest-ig-heiko.png\",\"caption\":\"$INSTA\"}}"
          # Beitrags-Link
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"text\",\"text\":{\"body\":\"✅ *Veröffentlicht!* $POST_URL\"}}"
