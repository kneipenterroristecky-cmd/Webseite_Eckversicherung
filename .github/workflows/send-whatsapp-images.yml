name: 4 – WhatsApp-Bilder senden (manuell)

on:
  workflow_dispatch:

jobs:
  whatsapp:
    name: WhatsApp-Bilder senden
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: WhatsApp-Bilder senden
        env:
          WA_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_TOKEN:    ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:       ${{ secrets.WHATSAPP_TO_NUMBER }}
        run: |
          python3 - <<'PYEOF'
          import os, requests as req, sys

          token    = os.environ.get("WA_TOKEN", "").strip()
          phone_id = os.environ.get("WA_PHONE_ID", "").strip()
          wa_to    = os.environ.get("WA_TO", "").strip()

          if not all([token, phone_id, wa_to]):
            print("❌ Fehlende Secrets: WA_TOKEN, WA_PHONE_ID oder WA_TO nicht gesetzt!")
            sys.exit(1)

          media_api = f"https://graph.facebook.com/v19.0/{phone_id}/media"
          msg_api   = f"https://graph.facebook.com/v19.0/{phone_id}/messages"
          auth      = {"Authorization": f"Bearer {token}"}

          BILDER = [
            ("social/latest-ig.png",       "Daniel"),
            ("social/latest-ig-heiko.png", "Heiko"),
            ("social/latest-ig-beide.png", "Beide"),
          ]

          # Schritt 1: Text-Template senden → öffnet 24h-Session (kein Zeitfenster nötig)
          print("=== Schritt 1: Session öffnen via blog_benachrichtigung ===")
          r = req.post(msg_api, headers={**auth, "Content-Type": "application/json"}, json={
            "messaging_product": "whatsapp",
            "to": wa_to,
            "type": "template",
            "template": {"name": "blog_benachrichtigung", "language": {"code": "de"}}
          })
          print(f"  Session-Template: {r.status_code} {'✅' if r.status_code < 300 else '❌'}")
          if r.status_code >= 300:
            print(f"  {r.text[:300]}")
            sys.exit(1)

          # Schritt 2: 3 Bilder als reiner Upload senden (kein Text, aktuelle Dateien aus Repo)
          print("\n=== Schritt 2: Bilder hochladen und senden ===")
          fehler = 0
          for pfad, label in BILDER:
            if not os.path.exists(pfad):
              print(f"  ⚠️  {label}: Datei nicht gefunden: {pfad}")
              fehler += 1
              continue

            with open(pfad, "rb") as f:
              ru = req.post(media_api, headers=auth,
                data={"messaging_product": "whatsapp"},
                files={"file": (os.path.basename(pfad), f, "image/png")})
            print(f"  Upload {label}: {ru.status_code}")
            if ru.status_code >= 300:
              print(f"    ❌ {ru.text[:300]}")
              fehler += 1
              continue

            media_id = ru.json().get("id")
            if not media_id:
              print(f"    ❌ Keine media_id: {ru.text[:200]}")
              fehler += 1
              continue

            rs = req.post(msg_api, headers={**auth, "Content-Type": "application/json"}, json={
              "messaging_product": "whatsapp",
              "to": wa_to,
              "type": "image",
              "image": {"id": media_id}
            })
            print(f"  Senden {label}: {rs.status_code} {'✅' if rs.status_code < 300 else '❌'}")
            if rs.status_code >= 300:
              print(f"    ❌ {rs.text[:300]}")
              fehler += 1

          print(f"\n{'✅ Alle Bilder gesendet!' if fehler == 0 else f'❌ {fehler} Fehler aufgetreten!'}")
          if fehler:
            sys.exit(1)
          PYEOF
