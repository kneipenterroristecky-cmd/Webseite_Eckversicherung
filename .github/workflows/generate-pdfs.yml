name: Generate Tool PDFs

on:
  push:
    paths:
      - 'produkte/0[1-5]-*.html'
      - '.github/workflows/generate-pdfs.yml'
  workflow_dispatch:

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer http-server

      - name: Generate PDFs
        run: node .github/generate-pdfs.js

      - name: Commit PDFs
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin master
          cp -r produkte/pdfs /tmp/pdfs-generated
          git checkout -f origin/master
          cp -r /tmp/pdfs-generated/. produkte/pdfs/
          git add produkte/pdfs/
          git diff --staged --quiet || (git commit -m "Auto-generate tool PDFs [skip ci]" && git push origin HEAD:refs/heads/master)
