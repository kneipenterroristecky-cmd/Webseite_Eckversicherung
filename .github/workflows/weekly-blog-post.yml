name: 1 – Blog-Beitrag erstellen (automatisch montags)

on:
  schedule:
    - cron: '0 9 * * 1'   # Jeden Montag 10:00 Uhr DE
  workflow_dispatch:        # Auch manuell startbar

jobs:
  erstellen:
    name: Beitrag mit KI erstellen
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests playwright pillow

      - name: Blog-Beitrag generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/generate_post.py

      - name: Playwright Chromium installieren
        run: playwright install chromium --with-deps

      - name: Social-Media-Bild rendern
        run: python tools/generate_social_image.py

      - name: Entwurf ins Repository committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin master
          git stash pop
          git add blog/posts/ tools/draft_meta.json social/latest-ig.html social/latest-ig.png social/latest-ig-heiko.html social/latest-ig-heiko.png social/latest-ig-clean.png
          TITLE=$(python3 -c "import json; print(json.load(open('tools/draft_meta.json'))['title'])")
          git commit -m "Blog-Entwurf: $TITLE"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push-Versuch $i fehlgeschlagen, warte 15 Sekunden..."
            sleep 15
          done

      - name: Metadaten für Benachrichtigung vorbereiten
        run: |
          TITLE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['title'])")
          DATE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['date_de'])")
          APPROVE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/publish-blog-post.yml"
          CHANGE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/request-changes.yml"
          echo "POST_TITLE=$TITLE" >> $GITHUB_ENV
          echo "POST_DATE=$DATE" >> $GITHUB_ENV
          echo "APPROVE_URL=$APPROVE_URL" >> $GITHUB_ENV
          echo "CHANGE_URL=$CHANGE_URL" >> $GITHUB_ENV
          INSTA=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['instagram_caption'])")
          INSTA_SAFE=$(echo "$INSTA" | tr -d '\n\r' | sed 's/"/\\"/g')
          echo "POST_INSTA=$INSTA_SAFE" >> $GITHUB_ENV

      - name: WhatsApp-Status-Vorlage an Daniel senden
        env:
          WA_PHONE_ID:   ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_APP_ID:     ${{ secrets.WHATSAPP_APP_ID }}
          WA_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WA_TOKEN:      ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:         ${{ secrets.WHATSAPP_TO_NUMBER }}
        run: |
          python3 - <<'PYEOF'
          import os, json, requests as req

          token    = os.environ.get("WA_TOKEN", "")
          app_id   = os.environ.get("WA_APP_ID", "")
          app_sec  = os.environ.get("WA_APP_SECRET", "")
          phone_id = os.environ.get("WA_PHONE_ID", "")
          wa_to    = os.environ.get("WA_TO", "")
          approve  = os.environ.get("APPROVE_URL", "")
          repo     = os.environ.get("GITHUB_REPOSITORY", "")

          if token and app_id and app_sec:
            try:
              r = req.get("https://graph.facebook.com/v19.0/oauth/access_token",
                params={"grant_type":"fb_exchange_token","client_id":app_id,
                        "client_secret":app_sec,"fb_exchange_token":token}, timeout=15)
              fresh = r.json().get("access_token","")
              if fresh:
                token = fresh
                print("✅ Token verlängert")
              else:
                print("⚠️  Token-Verlängerung fehlgeschlagen")
            except Exception as e:
              print(f"⚠️  Token-Fehler: {e}")

          raw_base = f"https://raw.githubusercontent.com/{repo}/master/social"
          with open("tools/draft_meta.json", encoding="utf-8") as f:
            meta = json.load(f)
          caption = meta.get("instagram_caption", "")

          api     = f"https://graph.facebook.com/v19.0/{phone_id}/messages"
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          def send(payload):
            r = req.post(api, headers=headers, json=payload)
            print(f"WA {payload['type']}: {r.status_code}")
            if r.status_code >= 300:
              print(f"  ❌ {r.text[:400]}")

          send({"messaging_product":"whatsapp","to":wa_to,"type":"image",
                "image":{"link":f"{raw_base}/latest-ig.png","caption":caption}})
          send({"messaging_product":"whatsapp","to":wa_to,"type":"image",
                "image":{"link":f"{raw_base}/latest-ig-heiko.png","caption":caption}})
          send({"messaging_product":"whatsapp","to":wa_to,"type":"text",
                "text":{"body":f"✅ *Freigabe:* {approve}"}})
          PYEOF

      - name: Freigabe-E-Mail an Daniel senden
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, html as hl, requests as req, json, re, io, base64 as b64m
          from PIL import Image

          def thumb(path, w=150, h=267):
            try:
              img = Image.open(path).convert("RGB")
              img = img.resize((w, h), Image.Resampling.LANCZOS)
              buf = io.BytesIO()
              img.save(buf, "JPEG", quality=40, optimize=True)
              data = b64m.b64encode(buf.getvalue()).decode()
              print(f"Thumbnail {path}: {len(data)//1024}KB (base64)")
              return "data:image/jpeg;base64," + data
            except Exception as e:
              print(f"Thumbnail-Fehler {path}: {e}")
              return ""

          meta        = json.load(open("tools/draft_meta.json", encoding="utf-8"))
          title       = meta.get("title", "")
          date_de     = meta.get("date_de", "")
          fb_text     = meta.get("social_summary", "")
          ig_text     = meta.get("instagram_caption", "")
          approve_url = os.environ.get("APPROVE_URL", "")
          change_url  = os.environ.get("CHANGE_URL", "")
          api_key     = os.environ.get("BREVO_API_KEY", "").strip()
          d_src = thumb("social/latest-ig.png")
          h_src = thumb("social/latest-ig-heiko.png")
          excerpt = ""
          try:
            raw = open(f"blog/posts/{meta['filename']}", encoding="utf-8").read()
            m = re.search(r'<div class="blog-content">(.*?)</div>\s*<div class="blog-author', raw, re.DOTALL)
            if m:
              text = re.sub(r'<[^>]+>', ' ', m.group(1))
              text = re.sub(r'\s+', ' ', text).strip()
              excerpt = hl.escape(text[:400]) + ("&#8230;" if len(text) > 400 else "")
          except Exception:
            pass
          t  = hl.escape(title)
          d  = hl.escape(date_de)
          fb = hl.escape(fb_text)
          ig = hl.escape(ig_text).replace("\n", "<br>")
          img_d = f'<img src="{d_src}" width="150" height="267" style="display:block;border-radius:5px">' if d_src else '<table width="150" height="267" cellpadding="0" cellspacing="0"><tr><td style="background:#cbd5e1;border-radius:5px;text-align:center;vertical-align:middle;font-family:Arial,sans-serif;font-size:11px;color:#94a3b8">Bild</td></tr></table>'
          img_h = f'<img src="{h_src}" width="150" height="267" style="display:block;border-radius:5px">' if h_src else '<table width="150" height="267" cellpadding="0" cellspacing="0"><tr><td style="background:#cbd5e1;border-radius:5px;text-align:center;vertical-align:middle;font-family:Arial,sans-serif;font-size:11px;color:#94a3b8">Bild</td></tr></table>'
          body = (
            '<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f1f5f9" border="0"><tr><td align="center" style="padding:16px 8px">'
            '<table width="500" align="center" cellpadding="0" cellspacing="0" border="0">'
            # Header
            '<tr><td width="500" bgcolor="#172d50" style="padding:16px 18px;border-radius:10px 10px 0 0">'
            '<p style="color:rgba(255,255,255,.5);margin:0 0 3px;font-family:Arial,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px">Neuer Blog-Entwurf</p>'
            f'<p style="color:#ffffff;margin:0 0 2px;font-family:Arial,sans-serif;font-size:15px;font-weight:800;line-height:1.35;word-break:break-word">{t}</p>'
            f'<p style="color:rgba(255,255,255,.45);margin:0;font-family:Arial,sans-serif;font-size:11px">{d}</p>'
            '</td></tr>'
            # Bilder nebeneinander
            '<tr><td width="500" bgcolor="#ffffff" style="padding:12px 14px 14px;border-top:3px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px">WhatsApp-Bilder</p>'
            '<table cellpadding="0" cellspacing="0" border="0"><tr>'
            '<td valign="top" style="padding-right:10px">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;color:#94a3b8;margin:0 0 4px;font-weight:600;text-align:center">Daniel</p>'
            f'{img_d}</td>'
            '<td valign="top">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;color:#94a3b8;margin:0 0 4px;font-weight:600;text-align:center">Heiko</p>'
            f'{img_h}</td>'
            '</tr></table>'
            '</td></tr>'
            # Beitrags-Auszug
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px;border-top:3px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 6px">Beitrags-Auszug</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#374151;line-height:1.55;margin:0;word-break:break-word">{excerpt}</p>'
            '</td></tr>'
            # Facebook
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px;border-top:3px solid #f1f5f9;word-break:break-word">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 6px">&#128216; Facebook</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#1e3a5f;line-height:1.55;background:#eff6ff;padding:9px 11px;border-radius:5px;border-left:3px solid #3b82f6;margin:0;word-break:break-word">{fb}</p>'
            '</td></tr>'
            # Instagram
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px;border-top:3px solid #f1f5f9;word-break:break-word">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:0 0 6px">&#128248; Instagram</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#374151;line-height:1.55;background:#fefce8;padding:9px 11px;border-radius:5px;border-left:3px solid #eab308;margin:0;word-break:break-word">{ig}</p>'
            '</td></tr>'
            # Buttons
            '<tr><td width="500" bgcolor="#ffffff" style="padding:10px 14px 16px;border-top:3px solid #f1f5f9;border-radius:0 0 10px 10px">'
            f'<a href="{approve_url}" style="display:block;background:#16a34a;color:#ffffff;text-align:center;padding:12px 16px;border-radius:6px;text-decoration:none;font-family:Arial,sans-serif;font-size:14px;font-weight:700;margin-bottom:7px">&#9989; Freigeben &amp; ver&ouml;ffentlichen</a>'
            f'<a href="{change_url}" style="display:block;background:#f59e0b;color:#ffffff;text-align:center;padding:12px 16px;border-radius:6px;text-decoration:none;font-family:Arial,sans-serif;font-size:14px;font-weight:700">&#9999;&#65039; &Auml;nderung beantragen</a>'
            '</td></tr>'
            '</table>'
            '</td></tr></table>'
          )
          print(f"E-Mail Body: {len(body)//1024}KB")
          payload = {
            "sender": {"name": "Daniel Eck Webseite", "email": "kneipenterroristecky@googlemail.com"},
            "to": [{"email": "daniel@eckversicherung.de", "name": "Daniel Eck"}],
            "subject": f"Neuer Blog-Entwurf zur Freigabe: {title}",
            "htmlContent": body
          }
          r = req.post("https://api.brevo.com/v3/smtp/email",
            headers={"api-key": api_key, "Content-Type": "application/json"},
            json=payload)
          print(f"E-Mail Status: {r.status_code}")
          if r.status_code >= 300:
            print(f"Fehler: {r.text[:500]}")
          PYEOF
