name: Wöchentlicher Blog-Beitrag

on:
  schedule:
    - cron: '0 7 * * 1'   # Jeden Montag um 07:00 Uhr UTC (= 08:00 / 09:00 DE)
  workflow_dispatch:        # Auch manuell auslösbar

jobs:
  # ── Job 1: Beitrag mit KI erstellen ───────────────────────────────────────
  erstellen:
    name: 📝 Beitrag erstellen
    runs-on: ubuntu-latest
    outputs:
      post_title: ${{ steps.gen.outputs.post_title }}
      post_filename: ${{ steps.gen.outputs.post_filename }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests

      - name: Blog-Beitrag generieren
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/generate_post.py

      - name: Vorschau in GitHub Actions Summary anzeigen
        run: |
          echo "## 📄 Entwurf: $(cat tools/draft_meta.json | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Datum:** $(date '+%d.%m.%Y')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Facebook-Text:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat tools/draft_meta.json | python3 -c "import sys,json; print(json.load(sys.stdin)['social_summary'])" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Instagram-Caption:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat tools/draft_meta.json | python3 -c "import sys,json; print(json.load(sys.stdin)['instagram_caption'])" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Entwurf als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: blog-entwurf
          path: |
            blog/posts/
            tools/draft_meta.json
          retention-days: 7

  # ── Job 2: Freigabe + Veröffentlichung ────────────────────────────────────
  veroeffentlichen:
    name: 🚀 Veröffentlichen
    needs: erstellen
    runs-on: ubuntu-latest
    environment: freigabe      # ← Hier müssen Sie in GitHub klicken!
    steps:
      - uses: actions/checkout@v4

      - name: Entwurf herunterladen
        uses: actions/download-artifact@v4
        with:
          name: blog-entwurf

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Überall veröffentlichen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/publish_post.py
