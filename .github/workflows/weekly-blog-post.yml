name: 1 – Blog-Beitrag erstellen (automatisch montags)

on:
  schedule:
    - cron: '0 9 * * 1'   # Jeden Montag 10:00 Uhr DE
  workflow_dispatch:        # Auch manuell startbar

jobs:
  erstellen:
    name: Beitrag mit KI erstellen
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests playwright pillow

      - name: Blog-Beitrag generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/generate_post.py

      - name: Playwright Chromium installieren
        run: playwright install chromium --with-deps

      - name: Social-Media-Bild rendern
        run: python tools/generate_social_image.py

      - name: Entwurf ins Repository committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin master
          git stash pop
          git add blog/posts/ tools/draft_meta.json social/latest-ig.html social/latest-ig.png social/latest-ig-heiko.html social/latest-ig-heiko.png
          TITLE=$(python3 -c "import json; print(json.load(open('tools/draft_meta.json'))['title'])")
          git commit -m "Blog-Entwurf: $TITLE"
          git push

      - name: Metadaten für Benachrichtigung vorbereiten
        run: |
          TITLE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['title'])")
          DATE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['date_de'])")
          APPROVE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/publish-blog-post.yml"
          CHANGE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/request-changes.yml"
          echo "POST_TITLE=$TITLE" >> $GITHUB_ENV
          echo "POST_DATE=$DATE" >> $GITHUB_ENV
          echo "APPROVE_URL=$APPROVE_URL" >> $GITHUB_ENV
          echo "CHANGE_URL=$CHANGE_URL" >> $GITHUB_ENV
          INSTA=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['instagram_caption'])")
          INSTA_SAFE=$(echo "$INSTA" | tr -d '\n\r' | sed 's/"/\\"/g')
          echo "POST_INSTA=$INSTA_SAFE" >> $GITHUB_ENV

      - name: WhatsApp-Status-Vorlage an Daniel senden
        env:
          WA_PHONE_ID:   ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_APP_ID:     ${{ secrets.WHATSAPP_APP_ID }}
          WA_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WA_TOKEN:      ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:         ${{ secrets.WHATSAPP_TO_NUMBER }}
        run: |
          # Token via fb_exchange_token zu einem 60-Tage-Token verlängern
          ACTIVE_TOKEN="$WA_TOKEN"
          if [ -n "$WA_TOKEN" ] && [ -n "$WA_APP_ID" ] && [ -n "$WA_APP_SECRET" ]; then
            FRESH=$(curl -s "https://graph.facebook.com/v19.0/oauth/access_token?grant_type=fb_exchange_token&client_id=${WA_APP_ID}&client_secret=${WA_APP_SECRET}&fb_exchange_token=${WA_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null || echo "")
            if [ -n "$FRESH" ]; then
              ACTIVE_TOKEN="$FRESH"
              echo "✅ Token auf 60 Tage verlängert"
            else
              echo "⚠️  Token-Verlängerung fehlgeschlagen – originalen Token verwenden"
            fi
          fi

          RAW_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/master/social"
          send_wa() {
            RESP=$(curl -s -X POST "https://graph.facebook.com/v19.0/${WA_PHONE_ID}/messages" \
              -H "Authorization: Bearer $ACTIVE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$1")
            echo "$RESP"
            if echo "$RESP" | grep -q '"error"'; then
              echo "⚠️  WhatsApp-Fehler (kein Abbruch): $RESP"
            fi
          }

          # 1) Daniel-Bild
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"image\",\"image\":{\"link\":\"${RAW_BASE}/latest-ig.png\",\"caption\":\"$POST_INSTA\"}}"
          # 2) Heiko-Bild
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"image\",\"image\":{\"link\":\"${RAW_BASE}/latest-ig-heiko.png\",\"caption\":\"$POST_INSTA\"}}"
          # 3) Freigabe-Link
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"text\",\"text\":{\"body\":\"✅ *Freigabe:* $APPROVE_URL\"}}"

      - name: Freigabe-E-Mail an Daniel senden
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, html as hl, requests as req, json, re, io, base64 as b64m
          from PIL import Image

          def thumb(path):
            try:
              img = Image.open(path).convert("RGB")
              img.thumbnail((150, 267), Image.LANCZOS)
              buf = io.BytesIO()
              img.save(buf, "JPEG", quality=72, optimize=True)
              return "data:image/jpeg;base64," + b64m.b64encode(buf.getvalue()).decode()
            except Exception as e:
              print(f"Thumbnail-Fehler: {e}")
              return ""

          meta        = json.load(open("tools/draft_meta.json", encoding="utf-8"))
          title       = meta.get("title", "")
          date_de     = meta.get("date_de", "")
          fb_text     = meta.get("social_summary", "")
          ig_text     = meta.get("instagram_caption", "")
          approve_url = os.environ.get("APPROVE_URL", "")
          change_url  = os.environ.get("CHANGE_URL", "")
          api_key     = os.environ.get("BREVO_API_KEY", "").strip()
          d_src = thumb("social/latest-ig.png")
          h_src = thumb("social/latest-ig-heiko.png")
          blog_html = ""
          try:
            raw = open(f"blog/posts/{meta['filename']}", encoding="utf-8").read()
            m = re.search(r'<div class="blog-content">(.*?)</div>\s*<div class="blog-author', raw, re.DOTALL)
            if m:
              c = m.group(1)
              c = re.sub(r"<h2[^>]*>", '<p style="font-size:14px;font-weight:700;color:#172d50;margin:14px 0 5px">', c)
              c = re.sub(r"</h2>", "</p>", c)
              c = re.sub(r"<p[^>]*>", '<p style="font-size:13px;color:#374151;line-height:1.65;margin:0 0 9px">', c)
              c = re.sub(r"<ul[^>]*>", '<ul style="font-size:13px;color:#374151;padding-left:18px;margin:0 0 9px">', c)
              c = re.sub(r"<li[^>]*>", '<li style="margin-bottom:4px">', c)
              blog_html = c.strip()
          except Exception as e:
            blog_html = f"<p>Fehler beim Laden: {e}</p>"
          t  = hl.escape(title)
          d  = hl.escape(date_de)
          fb = hl.escape(fb_text)
          ig = hl.escape(ig_text).replace("\n", "<br>")
          img_d = f'<img src="{d_src}" width="150" height="267" style="display:block;border-radius:6px">' if d_src else '<div style="width:150px;height:267px;background:#e2e8f0;border-radius:6px"></div>'
          img_h = f'<img src="{h_src}" width="150" height="267" style="display:block;border-radius:6px">' if h_src else '<div style="width:150px;height:267px;background:#e2e8f0;border-radius:6px"></div>'
          body = (
            '<table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9">'
            '<tr><td align="center" style="padding:0">'
            '<table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%">'
            # Header
            '<tr><td style="background:#172d50;padding:18px 20px;border-radius:10px 10px 0 0">'
            '<p style="color:rgba(255,255,255,.5);margin:0 0 4px;font-family:Arial,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px">Neuer Blog-Entwurf</p>'
            f'<p style="color:#fff;margin:0 0 2px;font-family:Arial,sans-serif;font-size:16px;font-weight:800;line-height:1.3">{t}</p>'
            f'<p style="color:rgba(255,255,255,.45);margin:0;font-family:Arial,sans-serif;font-size:11px">{d}</p>'
            '</td></tr>'
            # Bilder
            '<tr><td style="background:#fff;padding:14px 16px 16px;border-top:2px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 10px">WhatsApp-Bilder</p>'
            '<table width="100%" cellpadding="0" cellspacing="0"><tr>'
            '<td width="50%" style="padding-right:6px;text-align:center;vertical-align:top">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;color:#94a3b8;margin:0 0 5px;font-weight:600">Daniel</p>'
            f'{img_d}</td>'
            '<td width="50%" style="padding-left:6px;text-align:center;vertical-align:top">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;color:#94a3b8;margin:0 0 5px;font-weight:600">Heiko</p>'
            f'{img_h}</td>'
            '</tr></table>'
            '</td></tr>'
            # Blogtext
            '<tr><td style="background:#fff;padding:14px 16px;border-top:2px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 10px">Blogbeitrag</p>'
            f'{blog_html}'
            '</td></tr>'
            # Facebook
            '<tr><td style="background:#fff;padding:12px 16px;border-top:2px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 7px">&#128216; Facebook</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#1e3a5f;line-height:1.6;background:#eff6ff;padding:10px 12px;border-radius:6px;border-left:3px solid #3b82f6;margin:0">{fb}</p>'
            '</td></tr>'
            # Instagram
            '<tr><td style="background:#fff;padding:12px 16px;border-top:2px solid #f1f5f9">'
            '<p style="font-family:Arial,sans-serif;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 7px">&#128248; Instagram</p>'
            f'<p style="font-family:Arial,sans-serif;font-size:13px;color:#374151;line-height:1.6;background:#fefce8;padding:10px 12px;border-radius:6px;border-left:3px solid #eab308;margin:0">{ig}</p>'
            '</td></tr>'
            # Buttons
            '<tr><td style="background:#fff;padding:12px 16px 18px;border-top:2px solid #f1f5f9;border-radius:0 0 10px 10px">'
            f'<a href="{approve_url}" style="display:block;background:#16a34a;color:#fff;text-align:center;padding:13px 20px;border-radius:7px;text-decoration:none;font-family:Arial,sans-serif;font-size:14px;font-weight:700;margin-bottom:8px">&#9989; Freigeben &amp; ver&ouml;ffentlichen</a>'
            f'<a href="{change_url}" style="display:block;background:#f59e0b;color:#fff;text-align:center;padding:13px 20px;border-radius:7px;text-decoration:none;font-family:Arial,sans-serif;font-size:14px;font-weight:700">&#9999;&#65039; &Auml;nderung beantragen</a>'
            '</td></tr>'
            '</table>'
            '</td></tr></table>'
          )
          payload = {
            "sender": {"name": "Daniel Eck Webseite", "email": "kneipenterroristecky@googlemail.com"},
            "to": [{"email": "daniel@eckversicherung.de", "name": "Daniel Eck"}],
            "subject": f"Neuer Blog-Entwurf zur Freigabe: {title}",
            "htmlContent": body
          }
          r = req.post("https://api.brevo.com/v3/smtp/email",
            headers={"api-key": api_key, "Content-Type": "application/json"},
            json=payload)
          print(f"E-Mail Status: {r.status_code}")
          if r.status_code >= 300:
            print(f"Fehler: {r.text[:500]}")
          PYEOF
