name: 1 – Blog-Beitrag erstellen (automatisch montags)

on:
  schedule:
    - cron: '*/5 8-16 * * 1'  # Jeden Montag alle 5 Min von 10:00–18:00 Uhr DE (Sommer)
    - cron: '*/5 9-16 * * 1'  # Jeden Montag alle 5 Min von 10:00–17:00 Uhr DE (Winter)
  workflow_dispatch:            # Auch manuell startbar

concurrency:
  # Alle Cron-Läufe teilen sich eine Gruppe und laufen nacheinander (nicht parallel),
  # damit die Duplikat-Prüfung unten zuverlässig greift und nur EINE Freigabe-Mail verschickt wird.
  # Manuelle Läufe (workflow_dispatch) bekommen ihre eigene Gruppe und werden nicht blockiert.
  group: weekly-blog-post-${{ github.event_name == 'schedule' && 'cron' || github.run_id }}
  cancel-in-progress: false

jobs:
  duplikat-check:
    name: Bereits heute gelaufen?
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - id: check
        run: |
          TODAY=$(TZ="Europe/Berlin" date +%Y-%m-%d)
          COUNT=$(git log --oneline --after="${TODAY}T00:00:00" -- tools/draft_meta.json | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "Heute bereits gelaufen – überspringe zweiten Trigger."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  erstellen:
    name: Beitrag mit KI erstellen
    needs: duplikat-check
    if: needs.duplikat-check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests playwright pillow

      - name: "Panel: Nadine startet"
        env:
          PANEL_WORKER_URL: ${{ secrets.PANEL_WORKER_URL }}
          PANEL_SYNC_SECRET: ${{ secrets.PANEL_SYNC_SECRET }}
        run: python tools/panel_heartbeat.py nadine "schreibt den Blog-Beitrag und die Instagram-Caption"

      - name: Blog-Beitrag generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python tools/generate_post.py

      - name: Playwright Chromium installieren
        run: playwright install chromium --with-deps

      - name: "Panel: Jonas startet"
        env:
          PANEL_WORKER_URL: ${{ secrets.PANEL_WORKER_URL }}
          PANEL_SYNC_SECRET: ${{ secrets.PANEL_SYNC_SECRET }}
        run: python tools/panel_heartbeat.py jonas "erstellt die Social-Media-Bilder"

      - name: Social-Media-Bild rendern
        run: python tools/generate_social_image.py

      - name: "Panel: Status leeren (wartet jetzt auf Daniels Freigabe)"
        if: always()
        env:
          PANEL_WORKER_URL: ${{ secrets.PANEL_WORKER_URL }}
          PANEL_SYNC_SECRET: ${{ secrets.PANEL_SYNC_SECRET }}
        run: python tools/panel_heartbeat.py clear

      - name: Entwurf ins Repository committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin master
          git stash pop
          git add blog/posts/ tools/draft_meta.json social/latest-ig.html social/latest-ig.png social/latest-ig-heiko.html social/latest-ig-heiko.png social/latest-ig-beide.html social/latest-ig-beide.png social/latest-ig-clean.png
          TITLE=$(python3 -c "import json; print(json.load(open('tools/draft_meta.json'))['title'])")
          git commit -m "Blog-Entwurf: $TITLE"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push-Versuch $i fehlgeschlagen, warte 15 Sekunden..."
            sleep 15
          done

      - name: "Panel: Herr Brandt prüft den Entwurf"
        env:
          PANEL_WORKER_URL: ${{ secrets.PANEL_WORKER_URL }}
          PANEL_SYNC_SECRET: ${{ secrets.PANEL_SYNC_SECRET }}
        run: python tools/panel_heartbeat.py brandt "prüft Text, Bilder und Meta-Daten vor der Freigabe-Anfrage"

      - name: Qualitätsprüfung (Herr Brandt)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PANEL_WORKER_URL: ${{ secrets.PANEL_WORKER_URL }}
          PANEL_SYNC_SECRET: ${{ secrets.PANEL_SYNC_SECRET }}
        run: python tools/pr_review.py

      - name: "Panel: Status leeren"
        if: always()
        env:
          PANEL_WORKER_URL: ${{ secrets.PANEL_WORKER_URL }}
          PANEL_SYNC_SECRET: ${{ secrets.PANEL_SYNC_SECRET }}
        run: python tools/panel_heartbeat.py clear

      - name: Metadaten für Benachrichtigung vorbereiten
        run: |
          TITLE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['title'])")
          DATE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['date_de'])")
          echo "POST_TITLE=$TITLE" >> $GITHUB_ENV
          echo "POST_DATE=$DATE" >> $GITHUB_ENV
          INSTA=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['instagram_caption'])")
          INSTA_SAFE=$(echo "$INSTA" | tr -d '\n\r' | sed 's/"/\\"/g')
          echo "POST_INSTA=$INSTA_SAFE" >> $GITHUB_ENV

      - name: Freigabe-Nachricht per WhatsApp senden
        env:
          WA_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_TO: ${{ secrets.WHATSAPP_TO_NUMBER }}
          APPROVE_WORKER_URL: ${{ secrets.APPROVE_WORKER_URL }}
          APPROVE_TOKEN: ${{ secrets.APPROVE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, requests as req, sys

          meta    = json.load(open("tools/draft_meta.json", encoding="utf-8"))
          title   = meta.get("title", "")
          date_de = meta.get("date_de", "")

          repo        = os.environ.get("GITHUB_REPOSITORY", "")
          worker_url  = os.environ.get("APPROVE_WORKER_URL", "").strip().rstrip("/")
          approve_tok = os.environ.get("APPROVE_TOKEN", "").strip()
          if worker_url and approve_tok:
            # Ein-Klick-Links (siehe tools/approve-worker.js) – funktionieren ohne GitHub-Login,
            # ideal am Handy: kein Tab-Wechsel, kein "Run workflow"-Dropdown.
            approve_url      = f"{worker_url}/approve?token={approve_tok}"
            change_url       = f"{worker_url}/change?token={approve_tok}"
            suggest_img_url  = f"{worker_url}/suggest-image?token={approve_tok}"
          else:
            # Fallback, solange der Worker noch nicht eingerichtet ist.
            approve_url      = f"https://github.com/{repo}/actions/workflows/publish-blog-post.yml"
            change_url       = f"https://github.com/{repo}/actions/workflows/request-changes.yml"
            suggest_img_url  = change_url

          token    = os.environ.get("WA_TOKEN", "").strip()
          phone_id = os.environ.get("WA_PHONE_ID", "").strip()
          wa_to    = os.environ.get("WA_TO", "").strip()
          if not all([token, phone_id, wa_to]):
            print("❌ Fehlende WhatsApp-Secrets!"); sys.exit(1)

          r = req.post(
            f"https://graph.facebook.com/v19.0/{phone_id}/messages",
            headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
            json={
              "messaging_product": "whatsapp",
              "to": wa_to,
              "type": "template",
              "template": {
                "name": "blog_entwurf_freigabe",
                "language": {"code": "de"},
                "components": [{
                  "type": "body",
                  "parameters": [
                    {"type": "text", "text": title},
                    {"type": "text", "text": date_de},
                    {"type": "text", "text": approve_url},
                    {"type": "text", "text": suggest_img_url},
                    {"type": "text", "text": change_url},
                  ]
                }]
              }
            })
          print(f"WhatsApp Status: {r.status_code}")
          if r.status_code >= 300:
            print(f"Fehler: {r.text[:500]}")
            sys.exit(1)
          PYEOF
