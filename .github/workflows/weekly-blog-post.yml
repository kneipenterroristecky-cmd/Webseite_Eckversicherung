name: 1 – Blog-Beitrag erstellen (automatisch montags)

on:
  schedule:
    - cron: '0 7 * * 1'   # Jeden Montag 08:00 Uhr DE
  workflow_dispatch:        # Auch manuell startbar

jobs:
  erstellen:
    name: Beitrag mit KI erstellen
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests

      - name: Blog-Beitrag generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/generate_post.py

      - name: Entwurf als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: blog-entwurf
          path: |
            blog/posts/
            tools/draft_meta.json
          retention-days: 7

      - name: GitHub Issue mit Vorschau erstellen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['title'])")
          SUMMARY=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['social_summary'])")
          INSTA=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['instagram_caption'])")
          FILENAME=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['filename'])")
          DATE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['date_de'])")

          gh issue create \
            --title "📝 Blog-Entwurf $DATE: $TITLE" \
            --body "## Neuer Blog-Beitrag zur Freigabe

          **Titel:** $TITLE
          **Datum:** $DATE
          **Datei:** blog/posts/$FILENAME

          ---

          ### Facebook-Text:
          \`\`\`
          $SUMMARY
          \`\`\`

          ### Instagram-Caption:
          \`\`\`
          $INSTA
          \`\`\`

          ---

          ## ✅ So genehmigen Sie den Beitrag:

          1. Lesen Sie den Entwurf oben
          2. Wenn alles passt: Gehen Sie zu **Actions → '2 – Blog veröffentlichen'**
          3. Klicken Sie **Run workflow**
          4. Fertig – wird automatisch auf Webseite, Facebook & Instagram gepostet

          > Dieses Issue automatisch schließen nach Veröffentlichung." \
            --label "blog-entwurf"
