name: 1 – Blog-Beitrag erstellen (automatisch montags)

on:
  schedule:
    - cron: '0 9 * * 1'   # Jeden Montag 10:00 Uhr DE
  workflow_dispatch:        # Auch manuell startbar

jobs:
  erstellen:
    name: Beitrag mit KI erstellen
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests playwright pillow

      - name: Blog-Beitrag generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/generate_post.py

      - name: Playwright Chromium installieren
        run: playwright install chromium --with-deps

      - name: Social-Media-Bild rendern
        run: python tools/generate_social_image.py

      - name: Entwurf ins Repository committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin master
          git stash pop
          git add blog/posts/ tools/draft_meta.json social/latest-ig.html social/latest-ig.png social/latest-ig-heiko.html social/latest-ig-heiko.png
          TITLE=$(python3 -c "import json; print(json.load(open('tools/draft_meta.json'))['title'])")
          git commit -m "Blog-Entwurf: $TITLE"
          git push

      - name: Metadaten für Benachrichtigung vorbereiten
        run: |
          TITLE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['title'])")
          DATE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['date_de'])")
          APPROVE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/publish-blog-post.yml"
          CHANGE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/request-changes.yml"
          echo "POST_TITLE=$TITLE" >> $GITHUB_ENV
          echo "POST_DATE=$DATE" >> $GITHUB_ENV
          echo "APPROVE_URL=$APPROVE_URL" >> $GITHUB_ENV
          echo "CHANGE_URL=$CHANGE_URL" >> $GITHUB_ENV
          INSTA=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['instagram_caption'])")
          INSTA_SAFE=$(echo "$INSTA" | tr -d '\n\r' | sed 's/"/\\"/g')
          echo "POST_INSTA=$INSTA_SAFE" >> $GITHUB_ENV

      - name: WhatsApp-Status-Vorlage an Daniel senden
        env:
          WA_PHONE_ID:   ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_APP_ID:     ${{ secrets.WHATSAPP_APP_ID }}
          WA_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WA_TOKEN:      ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:         ${{ secrets.WHATSAPP_TO_NUMBER }}
        run: |
          # Token via fb_exchange_token zu einem 60-Tage-Token verlängern
          ACTIVE_TOKEN="$WA_TOKEN"
          if [ -n "$WA_TOKEN" ] && [ -n "$WA_APP_ID" ] && [ -n "$WA_APP_SECRET" ]; then
            FRESH=$(curl -s "https://graph.facebook.com/v19.0/oauth/access_token?grant_type=fb_exchange_token&client_id=${WA_APP_ID}&client_secret=${WA_APP_SECRET}&fb_exchange_token=${WA_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null || echo "")
            if [ -n "$FRESH" ]; then
              ACTIVE_TOKEN="$FRESH"
              echo "✅ Token auf 60 Tage verlängert"
            else
              echo "⚠️  Token-Verlängerung fehlgeschlagen – originalen Token verwenden"
            fi
          fi

          RAW_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/master/social"
          send_wa() {
            RESP=$(curl -s -X POST "https://graph.facebook.com/v19.0/${WA_PHONE_ID}/messages" \
              -H "Authorization: Bearer $ACTIVE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$1")
            echo "$RESP"
            if echo "$RESP" | grep -q '"error"'; then
              echo "⚠️  WhatsApp-Fehler (kein Abbruch): $RESP"
            fi
          }

          # 1) Daniel-Bild
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"image\",\"image\":{\"link\":\"${RAW_BASE}/latest-ig.png\",\"caption\":\"$POST_INSTA\"}}"
          # 2) Heiko-Bild
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"image\",\"image\":{\"link\":\"${RAW_BASE}/latest-ig-heiko.png\",\"caption\":\"$POST_INSTA\"}}"
          # 3) Freigabe-Link
          send_wa "{\"messaging_product\":\"whatsapp\",\"to\":\"$WA_TO\",\"type\":\"text\",\"text\":{\"body\":\"✅ *Freigabe:* $APPROVE_URL\"}}"

      - name: Freigabe-E-Mail an Daniel senden
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import os, html as hl, requests as req, json, re
          meta        = json.load(open("tools/draft_meta.json", encoding="utf-8"))
          title       = meta.get("title", "")
          date_de     = meta.get("date_de", "")
          fb_text     = meta.get("social_summary", "")
          ig_text     = meta.get("instagram_caption", "")
          approve_url = os.environ.get("APPROVE_URL", "")
          change_url  = os.environ.get("CHANGE_URL", "")
          repo        = os.environ.get("GITHUB_REPOSITORY", "")
          api_key     = os.environ.get("BREVO_API_KEY", "").strip()
          run_id      = os.environ.get("GITHUB_RUN_ID", "")
          daniel_img  = f"https://raw.githubusercontent.com/{repo}/master/social/latest-ig.png?v={run_id}"
          heiko_img   = f"https://raw.githubusercontent.com/{repo}/master/social/latest-ig-heiko.png?v={run_id}"
          blog_html = ""
          try:
            raw = open(f"blog/posts/{meta['filename']}", encoding="utf-8").read()
            m = re.search(r'<div class="blog-content">(.*?)</div>\s*<div class="blog-author', raw, re.DOTALL)
            if m:
              c = m.group(1)
              c = re.sub(r"<h2[^>]*>", '<p style="font-size:15px;font-weight:700;color:#172d50;margin:16px 0 6px">', c)
              c = re.sub(r"</h2>", "</p>", c)
              c = re.sub(r"<p[^>]*>", '<p style="font-size:14px;color:#374151;line-height:1.7;margin:0 0 10px">', c)
              c = re.sub(r"<ul[^>]*>", '<ul style="font-size:14px;color:#374151;padding-left:20px;margin:0 0 10px">', c)
              c = re.sub(r"<li[^>]*>", '<li style="margin-bottom:5px">', c)
              blog_html = c.strip()
          except Exception as e:
            blog_html = f"<p>Fehler beim Laden: {e}</p>"
          t  = hl.escape(title)
          d  = hl.escape(date_de)
          fb = hl.escape(fb_text)
          ig = hl.escape(ig_text).replace("\n", "<br>")
          body = (
            '<div style="font-family:-apple-system,Arial,sans-serif;max-width:600px;margin:0 auto;background:#f1f5f9">'
            # Header
            '<div style="background:#172d50;padding:20px 22px;border-radius:12px 12px 0 0">'
            '<p style="color:rgba(255,255,255,.5);margin:0 0 5px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px">Neuer Blog-Entwurf</p>'
            f'<p style="color:#fff;margin:0 0 3px;font-size:17px;font-weight:800;line-height:1.3">{t}</p>'
            f'<p style="color:rgba(255,255,255,.45);margin:0;font-size:12px">{d}</p>'
            '</div>'
            # Bilder
            '<div style="background:#fff;padding:16px 18px 18px;margin-top:2px">'
            '<p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 10px">WhatsApp-Bilder</p>'
            '<table style="width:100%;border-collapse:collapse"><tr>'
            '<td style="width:50%;padding-right:5px;vertical-align:top">'
            '<p style="font-size:11px;color:#94a3b8;margin:0 0 5px;text-align:center;font-weight:600">Daniel</p>'
            f'<div style="height:220px;overflow:hidden;border-radius:8px;background:#f8fafc"><img src="{daniel_img}" width="100%" style="display:block"></div>'
            '</td>'
            '<td style="width:50%;padding-left:5px;vertical-align:top">'
            '<p style="font-size:11px;color:#94a3b8;margin:0 0 5px;text-align:center;font-weight:600">Heiko</p>'
            f'<div style="height:220px;overflow:hidden;border-radius:8px;background:#f8fafc"><img src="{heiko_img}" width="100%" style="display:block"></div>'
            '</td>'
            '</tr></table>'
            '</div>'
            # Blogtext
            '<div style="background:#fff;padding:16px 18px;margin-top:2px">'
            '<p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 12px">Blogbeitrag</p>'
            f'<div style="font-size:14px;color:#374151;line-height:1.75">{blog_html}</div>'
            '</div>'
            # Facebook
            '<div style="background:#fff;padding:14px 18px;margin-top:2px">'
            '<p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 8px">&#128216; Facebook</p>'
            f'<div style="font-size:14px;color:#1e3a5f;line-height:1.65;background:#eff6ff;padding:12px 14px;border-radius:8px;border-left:3px solid #3b82f6">{fb}</div>'
            '</div>'
            # Instagram
            '<div style="background:#fff;padding:14px 18px;margin-top:2px">'
            '<p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin:0 0 8px">&#128248; Instagram</p>'
            f'<div style="font-size:14px;color:#374151;line-height:1.75;background:#fefce8;padding:12px 14px;border-radius:8px;border-left:3px solid #eab308">{ig}</div>'
            '</div>'
            # Buttons
            '<div style="background:#fff;padding:14px 18px 20px;margin-top:2px;border-radius:0 0 12px 12px">'
            f'<a href="{approve_url}" style="display:block;background:#16a34a;color:#fff;text-align:center;padding:14px 20px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:700;margin-bottom:8px">&#9989; Freigeben &amp; ver&ouml;ffentlichen</a>'
            f'<a href="{change_url}" style="display:block;background:#f59e0b;color:#fff;text-align:center;padding:14px 20px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:700">&#9999;&#65039; &Auml;nderung beantragen</a>'
            '</div>'
            '</div>'
          )
          payload = {
            "sender": {"name": "Daniel Eck Webseite", "email": "kneipenterroristecky@googlemail.com"},
            "to": [{"email": "daniel@eckversicherung.de", "name": "Daniel Eck"}],
            "subject": f"Neuer Blog-Entwurf zur Freigabe: {title}",
            "htmlContent": body
          }
          r = req.post("https://api.brevo.com/v3/smtp/email",
            headers={"api-key": api_key, "Content-Type": "application/json"},
            json=payload)
          print(f"E-Mail Status: {r.status_code}")
          if r.status_code >= 300:
            print(f"Fehler: {r.text[:500]}")
          PYEOF
