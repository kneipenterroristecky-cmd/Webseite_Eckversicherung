name: 1 – Blog-Beitrag erstellen (automatisch montags)

on:
  schedule:
    - cron: '0 9 * * 1'   # Jeden Montag 10:00 Uhr DE
  workflow_dispatch:        # Auch manuell startbar

jobs:
  erstellen:
    name: Beitrag mit KI erstellen
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic requests playwright

      - name: Blog-Beitrag generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python tools/generate_post.py

      - name: Playwright Chromium installieren
        run: playwright install chromium --with-deps

      - name: Social-Media-Bild rendern
        run: python tools/generate_social_image.py

      - name: Entwurf ins Repository committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin master
          git stash pop
          git add blog/posts/ tools/draft_meta.json social/latest-ig.html social/latest-ig.png
          TITLE=$(python3 -c "import json; print(json.load(open('tools/draft_meta.json'))['title'])")
          git commit -m "Blog-Entwurf: $TITLE"
          git push

      - name: GitHub Issue mit Vorschau erstellen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          TITLE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['title'])")
          SUMMARY=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['social_summary'])")
          INSTA=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['instagram_caption'])")
          FILENAME=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['filename'])")
          DATE=$(python3 -c "import json; m=json.load(open('tools/draft_meta.json')); print(m['date_de'])")
          CONTENT=$(python3 -c "
          import json, re
          m = json.load(open('tools/draft_meta.json'))
          html = open(f'blog/posts/{m[\"filename\"]}').read()
          # Nur den Inhalt zwischen blog-content div extrahieren
          match = re.search(r'<div class=\"blog-content\">(.*?)</div>\s*<div class=\"blog-author', html, re.DOTALL)
          if match:
              text = match.group(1)
              # HTML-Tags entfernen für Lesbarkeit
              text = re.sub(r'<h2[^>]*>', '\n\n### ', text)
              text = re.sub(r'</h2>', '', text)
              text = re.sub(r'<li[^>]*>', '\n- ', text)
              text = re.sub(r'<[^>]+>', '', text)
              text = re.sub(r'\n{3,}', '\n\n', text).strip()
              print(text[:3000])
          ")
          APPROVE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/publish-blog-post.yml"

          ISSUE_URL=$(gh issue create \
            --assignee "${{ github.repository_owner }}" \
            --title "📝 Blog-Entwurf $DATE: $TITLE" \
            --body "## 📰 Neuer Beitrag zur Freigabe: $TITLE

          **Datum:** $DATE

          ---

          ## Beitragsinhalt (Vorschau)

          $CONTENT

          ---

          ### 📘 Facebook-Text:
          > $SUMMARY

          ### 📸 Instagram-Caption:
          > $INSTA

          ---

          ## ✅ Freigabe – ein Klick:

          👉 **[$TITLE freigeben und veröffentlichen]($APPROVE_URL)**

          Seite öffnet sich → **Run workflow** klicken → fertig.
          Beitrag erscheint dann automatisch auf Webseite, Facebook & Instagram.")
          echo "ISSUE_URL=$ISSUE_URL" >> $GITHUB_ENV
          echo "POST_TITLE=$TITLE" >> $GITHUB_ENV
          echo "POST_DATE=$DATE" >> $GITHUB_ENV
          echo "APPROVE_URL=$APPROVE_URL" >> $GITHUB_ENV
          # Instagram-Caption für WhatsApp (Sonderzeichen escapen)
          INSTA_SAFE=$(echo "$INSTA" | tr -d '\n\r' | sed 's/"/\\"/g')
          echo "POST_INSTA=$INSTA_SAFE" >> $GITHUB_ENV

      - name: WhatsApp-Status-Vorlage an Daniel senden
        env:
          WA_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_TOKEN:    ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_TO:       ${{ secrets.WHATSAPP_TO_NUMBER }}
          SITE_URL:    ${{ secrets.SITE_URL }}
        run: |
          IMAGE_URL="${SITE_URL}/social/latest-ig.png"
          # 1) Bild mit Instagram-Caption schicken (direkt als WhatsApp-Status verwendbar)
          curl -s -X POST "https://graph.facebook.com/v19.0/${WA_PHONE_ID}/messages" \
            -H "Authorization: Bearer $WA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"messaging_product\": \"whatsapp\",
              \"to\": \"$WA_TO\",
              \"type\": \"image\",
              \"image\": {
                \"link\": \"$IMAGE_URL\",
                \"caption\": \"$POST_INSTA\"
              }
            }"
          # 2) Freigabe-Link als Text
          curl -s -X POST "https://graph.facebook.com/v19.0/${WA_PHONE_ID}/messages" \
            -H "Authorization: Bearer $WA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"messaging_product\": \"whatsapp\",
              \"to\": \"$WA_TO\",
              \"type\": \"text\",
              \"text\": {
                \"body\": \"✅ *Freigabe:* $APPROVE_URL\n\nIssue: $ISSUE_URL\"
              }
            }"

      - name: Freigabe-E-Mail an Daniel senden
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          curl -s -X POST https://api.brevo.com/v3/smtp/email \
            -H "api-key: $BREVO_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"sender\": {\"name\": \"Daniel Eck Webseite\", \"email\": \"kneipenterroristecky@googlemail.com\"},
              \"to\": [{\"email\": \"daniel@eckversicherung.de\", \"name\": \"Daniel Eck\"}],
              \"subject\": \"📝 Neuer Blog-Entwurf zur Freigabe: $POST_TITLE\",
              \"htmlContent\": \"<div style='font-family:Arial,sans-serif;max-width:560px;margin:0 auto'><div style='background:#172d50;padding:24px 28px;border-radius:12px 12px 0 0'><h2 style='color:#fff;margin:0;font-size:18px'>📝 Neuer Blog-Entwurf</h2></div><div style='background:#fff;padding:28px;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px'><p style='margin:0 0 12px;font-size:15px;color:#172d50'><strong>$POST_TITLE</strong></p><p style='margin:0 0 4px;font-size:14px;color:#64748b'>Datum: $POST_DATE</p><p style='margin:0;font-size:12px;color:#94a3b8'>Vorschau: $ISSUE_URL</p></div></div>\"
            }"
