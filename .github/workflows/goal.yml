name: 🤖 /goal – Claude Code Runner

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      goal:
        description: 'Goal-Text'
        required: true
        type: string
      issue_number:
        description: 'Issue-Nummer (0 = kein Issue, z.B. bei WhatsApp)'
        required: false
        type: string
        default: '0'
      source:
        description: 'Auslöser (whatsapp / issue / manual)'
        required: false
        type: string
        default: 'manual'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  goal:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.state == 'open' &&
        github.event.issue.pull_request == null &&
        contains(github.event.comment.body, '/goal')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Git für automatische Commits konfigurieren ─────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      # ── Issue Comment: Reaktion + Label entfernen ──────────────────────
      - name: Acknowledge (Issue)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'goal:retry'
              });
            } catch(e) {}

      # ── workflow_dispatch: Tracking-Issue automatisch erstellen ────────
      - name: Create tracking issue
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number == '0'
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const source = '${{ github.event.inputs.source }}';
            const goal = `${{ github.event.inputs.goal }}`;
            const emoji = source === 'whatsapp' ? '📱' : '🖥️';

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${emoji} Goal: ${goal.substring(0, 80)}`,
              body: [
                `**Quelle:** ${source}`,
                `**Gestartet:** ${new Date().toISOString()}`,
                '',
                '**Goal:**',
                '```',
                goal,
                '```',
                '',
                '_Dieses Issue wird automatisch geschlossen wenn das Goal erledigt ist._'
              ].join('\n')
            });

            console.log(`Issue #${issue.number} erstellt.`);
            core.setOutput('issue_number', issue.number.toString());

      # ── WhatsApp: Eingangsbestätigung senden ───────────────────────────
      - name: WhatsApp – Eingangsbestätigung
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.source == 'whatsapp'
        run: |
          curl -s -X POST "https://graph.facebook.com/v19.0/${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}/messages" \
            -H "Authorization: Bearer ${{ secrets.WHATSAPP_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"messaging_product\": \"whatsapp\",
              \"to\": \"${{ secrets.WHATSAPP_TO_NUMBER }}\",
              \"type\": \"text\",
              \"text\": {\"body\": \"🚀 *Goal gestartet:*\\n\\n_${{ github.event.inputs.goal }}_\\n\\nClaude Code arbeitet daran...\"}
            }"

      # ── workflow_dispatch (Issue-Resume): Status-Kommentar ──────────────
      - name: Resume notice (Issue)
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.source != 'whatsapp' &&
          github.event.inputs.issue_number != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ github.event.inputs.issue_number }}'),
              body: '🔄 **Auto-Retry gestartet** – Claude Code versucht das Goal erneut...'
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt('${{ github.event.inputs.issue_number }}'),
                name: 'goal:retry'
              });
            } catch(e) {}

      # ── Claude Code ausführen (Issue Comment) ─────────────────────────
      - name: Run Claude Code (Issue Comment)
        if: github.event_name == 'issue_comment'
        id: claude_comment
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          trigger_phrase: "/goal"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # ── Claude Code ausführen (workflow_dispatch) ──────────────────────
      - name: Run Claude Code (Dispatch / WhatsApp)
        if: github.event_name == 'workflow_dispatch'
        id: claude_dispatch
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          trigger_phrase: "/goal"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ github.event.inputs.goal }}

      # ── Erfolg: Tracking-Issue schließen ──────────────────────────────
      - name: Close tracking issue (success)
        if: |
          github.event_name == 'workflow_dispatch' &&
          steps.claude_dispatch.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNr = parseInt('${{ steps.create_issue.outputs.issue_number || github.event.inputs.issue_number }}');
            if (!issueNr || issueNr === 0) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNr,
              body: '✅ **Goal erledigt!** Änderungen wurden in die Webseite committed.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNr,
              state: 'closed'
            });

      # ── WhatsApp: Erfolgs-Benachrichtigung ────────────────────────────
      - name: WhatsApp – Erfolg
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.source == 'whatsapp' &&
          steps.claude_dispatch.outcome == 'success'
        run: |
          curl -s -X POST "https://graph.facebook.com/v19.0/${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}/messages" \
            -H "Authorization: Bearer ${{ secrets.WHATSAPP_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"messaging_product\": \"whatsapp\",
              \"to\": \"${{ secrets.WHATSAPP_TO_NUMBER }}\",
              \"type\": \"text\",
              \"text\": {\"body\": \"✅ *Fertig!*\\n\\n_${{ github.event.inputs.goal }}_\\n\\nÄnderungen wurden in die Webseite committed.\"}
            }"

      # ── Fehlerbehandlung ───────────────────────────────────────────────
      - name: Handle failure
        if: |
          (github.event_name == 'issue_comment' && steps.claude_comment.outcome == 'failure') ||
          (github.event_name == 'workflow_dispatch' && steps.claude_dispatch.outcome == 'failure')
        uses: actions/github-script@v7
        env:
          SOURCE: ${{ github.event.inputs.source || 'issue' }}
          GOAL_TEXT: ${{ github.event.inputs.goal || '' }}
          ISSUE_NR: ${{ steps.create_issue.outputs.issue_number || github.event.inputs.issue_number || '0' }}
          WA_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WA_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WA_TO: ${{ secrets.WHATSAPP_TO_NUMBER }}
        with:
          script: |
            const source = process.env.SOURCE;
            const goalText = process.env.GOAL_TEXT;
            const issueNr = parseInt(process.env.ISSUE_NR || '0');

            // WhatsApp-Fehler-Benachrichtigung
            if (source === 'whatsapp') {
              await fetch(
                `https://graph.facebook.com/v19.0/${process.env.WA_PHONE_ID}/messages`,
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.WA_TOKEN}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    messaging_product: 'whatsapp',
                    to: process.env.WA_TO,
                    type: 'text',
                    text: { body: `⏸️ *Goal pausiert* – Limit erreicht.\n\nWird in ~1 Stunde automatisch erneut versucht.\n\nGoal: _${goalText}_` }
                  })
                }
              );
            }

            // Issue-Fehler-Behandlung (jetzt auch für workflow_dispatch)
            const issue_number = context.eventName === 'issue_comment'
              ? context.issue.number
              : issueNr;

            if (!issue_number || issue_number === 0) return;

            const goal = context.eventName === 'issue_comment'
              ? context.payload.comment.body
              : `/goal ${goalText}`;

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                labels: ['goal:retry']
              });
            } catch(e) {}

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: [
                '⏸️ **Goal pausiert** – Limit erreicht oder Fehler aufgetreten.',
                '',
                '**Auto-Retry** läuft stündlich automatisch.',
                '```',
                goal,
                '```',
                `_Log: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`
              ].join('\n')
            });
