name: 🔄 Goal Auto-Retry (stündlich)

on:
  schedule:
    - cron: '0 * * * *'   # Jede volle Stunde
  workflow_dispatch:       # Manuell auslösbar

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Suche pausierte Goals
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            // Issues mit goal:retry Label suchen
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'goal:retry',
              state: 'open',
              per_page: 10
            });

            if (issues.length === 0) {
              console.log('Keine pausierten Goals gefunden.');
              core.setOutput('found', 'false');
              return;
            }

            // Ältestes Issue zuerst bearbeiten
            const issue = issues[issues.length - 1];
            console.log(`Issue #${issue.number} gefunden: ${issue.title}`);

            // Letzten /goal Kommentar finden (nicht vom Bot)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });

            const goalComments = comments.filter(c =>
              c.body.includes('/goal') &&
              !c.body.includes('Auto-Retry') &&
              !c.body.includes('Goal pausiert')
            );

            if (goalComments.length === 0) {
              console.log('Kein /goal Kommentar gefunden – Label entfernen.');
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'goal:retry'
              }).catch(() => {});
              core.setOutput('found', 'false');
              return;
            }

            // Letzten Goal-Kommentar nehmen
            const lastGoal = goalComments[goalComments.length - 1];
            const goalText = lastGoal.body
              .replace('/goal', '')
              .replace('Auto-Retry', '')
              .trim();

            core.setOutput('found', 'true');
            core.setOutput('issue_number', issue.number.toString());
            core.setOutput('goal', goalText);
            console.log(`Goal gefunden: ${goalText.substring(0, 100)}...`);

      # goal.yml via workflow_dispatch triggern (braucht PAT mit workflow-Scope)
      - name: Trigger goal workflow
        if: steps.find.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          # Nutzt PAT wenn verfügbar, sonst GITHUB_TOKEN
          github-token: ${{ secrets.PAT_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.find.outputs.issue_number }}');
            const goal = `${{ steps.find.outputs.goal }}`;

            try {
              // Versuche goal.yml via workflow_dispatch zu triggern
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'goal.yml',
                ref: 'master',
                inputs: {
                  issue_number: issueNumber.toString(),
                  goal: goal
                }
              });
              console.log(`goal.yml für Issue #${issueNumber} gestartet.`);
            } catch(e) {
              console.log('workflow_dispatch fehlgeschlagen (kein PAT?):', e.message);
              // Fallback: Kommentar posten damit User manuell neu startet
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  '⚡ **Auto-Retry bereit** – bitte manuell neu starten:',
                  '',
                  '> Für vollautomatischen Retry: Secret `PAT_WORKFLOW` mit einem Personal Access Token (Scope: `workflow`) im Repo hinterlegen.',
                  '',
                  'Jetzt manuell starten: Kommentar unten kopieren und posten:',
                  '```',
                  `/goal ${goal}`,
                  '```'
                ].join('\n')
              });
            }
