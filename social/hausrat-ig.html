<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', Arial, sans-serif; background: #172d50; }
  .wrap { width: 1080px; height: 1080px; position: relative; display: flex; flex-direction: column; }

  /* Hintergrundbild oben */
  .img-area {
    flex: 0 0 480px;
    position: relative;
    overflow: hidden;
  }
  .img-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-area::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(23,45,80,.2) 0%, rgba(23,45,80,.9) 100%);
  }

  /* Inhalt unten */
  .body-area {
    flex: 1;
    background: #172d50;
    padding: 40px 60px 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(33,103,204,.25);
    border: 1px solid rgba(33,103,204,.5);
    color: #7ab3f5;
    font-size: 22px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 100px;
    letter-spacing: .05em;
    text-transform: uppercase;
    width: fit-content;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    line-height: 1.05;
    margin-bottom: 20px;
    letter-spacing: -.02em;
  }
  h1 span { color: #2167cc; }

  .sub {
    font-size: 30px;
    color: rgba(255,255,255,.75);
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 36px;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cta {
    background: #2167cc;
    color: #fff;
    font-size: 26px;
    font-weight: 800;
    padding: 18px 40px;
    border-radius: 14px;
    letter-spacing: -.01em;
  }

  .brand {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,.5);
    text-align: right;
    line-height: 1.3;
  }
  .brand strong { display: block; color: rgba(255,255,255,.85); font-size: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="img-area">
    <img src="https://images.unsplash.com/photo-1484101403633-562f891dc89a?w=1080&h=480&fit=crop&auto=format" />
  </div>
  <div class="body-area">
    <div>
      <div class="tag">🏠 Hausratversicherung</div>
      <h1>Was ist wirklich<br><span>versichert?</span></h1>
      <p class="sub">Viele Policen zahlen im Ernstfall weniger als erwartet. Ich prüfe das kostenlos für Sie.</p>
    </div>
    <div class="footer">
      <div class="cta">Jetzt kostenlos prüfen →</div>
      <div class="brand"><strong>Daniel Eck</strong>Versicherungsmakler<br>Schmalkalden</div>
    </div>
  </div>
</div>
</body>
</html>
