<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Arial Black', 'Arial', sans-serif; }
  .wrap {
    width: 1200px; height: 630px;
    position: relative; background: #111;
  }
  .bg {
    position: absolute; inset: 0;
    background-image: url('https://images.unsplash.com/photo-1484101403633-562f891dc89a?w=1200&h=630&fit=crop&auto=format');
    background-size: cover; background-position: center;
    opacity: 0.45;
  }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(0,0,0,.65) 0%, rgba(0,0,0,.25) 60%, rgba(0,0,0,.5) 100%);
  }
  .content {
    position: relative; z-index: 1;
    padding: 55px 70px;
    height: 100%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .label {
    font-size: 22px; font-weight: 700; color: #fff;
    margin-bottom: 16px;
  }
  .label span { color: #f5c842; }
  .title {
    font-size: 68px; font-weight: 900; line-height: 1.0;
    color: #f5a623; margin-bottom: 14px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 42px; font-weight: 900; color: #fff;
    line-height: 1.15; margin-bottom: 36px;
  }
  .cta {
    font-size: 24px; font-weight: 700; color: #fff;
  }
  .cta span { color: #5ddb6b; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <p class="label">Für <span>Hausbesitzer & Mieter:</span></p>
    <p class="title">Hausrat-<br>Versicherung</p>
    <p class="subtitle">richtig absichern –<br>nicht zu wenig zahlen!</p>
    <p class="cta">Jetzt Schutz prüfen <span>👇</span></p>
  </div>
</div>
</body>
</html>
