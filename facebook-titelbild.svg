<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <!-- Hintergrund -->
  <rect width="1640" height="624" fill="#172d50"/>

  <!-- Dezente Rasterlinien -->
  <g stroke="#1a50c8" stroke-width="0.6" opacity="0.06">
    <line x1="0" y1="208" x2="1640" y2="208"/>
    <line x1="0" y1="416" x2="1640" y2="416"/>
    <line x1="410" y1="0" x2="410" y2="624"/>
    <line x1="820" y1="0" x2="820" y2="624"/>
    <line x1="1230" y1="0" x2="1230" y2="624"/>
  </g>

  <!-- Dekoratives Element rechts -->
  <circle cx="1280" cy="280" r="200" fill="none" stroke="#1a50c8" stroke-width="1.5" opacity="0.08"/>
  <circle cx="1280" cy="280" r="135" fill="none" stroke="#1a50c8" stroke-width="1" opacity="0.06"/>
  <circle cx="1280" cy="280" r="70"  fill="#1a50c8" opacity="0.04"/>

  <!-- ── NAME oben ── -->
  <text x="104" y="68" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800"
        fill="#ffffff">Daniel Eck</text>
  <text x="104" y="90" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400"
        fill="#ffffff" letter-spacing="2">VERSICHERUNGSMAKLER</text>
  <rect x="104" y="104" width="440" height="1" rx="1" fill="rgba(255,255,255,0.08)"/>

  <!-- ── EYEBROW ── -->
  <rect x="104" y="132" width="24" height="1.5" rx="1" fill="#1a50c8" opacity="0.9"/>
  <text x="136" y="142" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600"
        fill="#ffffff" letter-spacing="3.5">SEIT ÜBER 20 JAHREN</text>
  <rect x="328" y="132" width="24" height="1.5" rx="1" fill="#1a50c8" opacity="0.9"/>

  <!-- ── HAUPTÜBERSCHRIFT ── -->
  <text x="104" y="225" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900"
        fill="#ffffff" letter-spacing="-2">Unser Service –</text>
  <text x="104" y="315" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900"
        letter-spacing="-2" fill="#ffffff">Ihre&#160;<tspan fill="#60a5fa">Sicherheit.</tspan></text>

  <!-- ── PHILOSOPHIE ── -->
  <text x="104" y="366" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="300"
        fill="#ffffff">Unabhängige Versicherungsberatung in 3. Generation –</text>
  <text x="104" y="392" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="300"
        fill="#ffffff">persönlich, transparent und immer in Ihrem Interesse.</text>

  <!-- ── DREI INFO-BOXEN unten ── -->

  <!-- Box 1: 3. Generation -->
  <rect x="104" y="460" width="190" height="72" rx="10" fill="#ffffff"/>
  <rect x="116" y="472" width="38" height="38" rx="8" fill="#eef2ff"/>
  <g transform="translate(135,491)" fill="#3b5bc8">
    <circle cx="-5" cy="-9" r="6"/>
    <ellipse cx="-5" cy="4" rx="9" ry="6"/>
    <circle cx="7" cy="-10" r="5" opacity="0.7"/>
    <ellipse cx="7" cy="3" rx="7" ry="5" opacity="0.7"/>
  </g>
  <text x="164" y="486" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#172d50">3. Generation</text>
  <text x="164" y="501" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#3b5bc8">Familientradition</text>

  <!-- Box 2: Seit 2002 -->
  <rect x="308" y="460" width="190" height="72" rx="10" fill="#ffffff"/>
  <rect x="320" y="472" width="38" height="38" rx="8" fill="#eef2ff"/>
  <g transform="translate(339,491)" fill="#3b5bc8">
    <rect x="-12" y="-10" width="24" height="21" rx="3" fill="#3b5bc8"/>
    <rect x="-12" y="-10" width="24" height="7"  rx="3" fill="#2a4ab0"/>
    <rect x="-7"  y="-13" width="3"  height="6"  rx="1.5" fill="#3b5bc8"/>
    <rect x="4"   y="-13" width="3"  height="6"  rx="1.5" fill="#3b5bc8"/>
    <polyline points="-5,3 -1,8 7,-1" fill="none" stroke="#ffffff" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="368" y="486" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#172d50">Seit 2002</text>
  <text x="368" y="501" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#3b5bc8">In Schmalkalden</text>

  <!-- Box 3: 100% Unabhängig -->
  <rect x="512" y="460" width="190" height="72" rx="10" fill="#ffffff"/>
  <rect x="524" y="472" width="38" height="38" rx="8" fill="#eef2ff"/>
  <g transform="translate(543,491)" fill="#3b5bc8">
    <circle cx="0" cy="-8" r="9" fill="none" stroke="#3b5bc8" stroke-width="2.5"/>
    <polygon points="0,-14 1.5,-10 5.5,-10 2.5,-7.5 3.5,-3.5 0,-6 -3.5,-3.5 -2.5,-7.5 -5.5,-10 -1.5,-10" fill="#3b5bc8"/>
    <path d="M-5,1 L-8,12 L0,8 L8,12 L5,1" fill="#3b5bc8"/>
  </g>
  <text x="572" y="486" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#172d50">100%</text>
  <text x="572" y="501" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#3b5bc8">Unabhängig</text>

</svg>
