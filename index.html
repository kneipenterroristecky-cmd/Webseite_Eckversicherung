<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=start.html" />
  <link rel="canonical" href="start.html" />
</head>
<body>
  <!-- Social Peek (Mobile) -->
  <div class="social-peek" id="socialPeek">
    <div id="gratisFloatWrap" class="gratis-float-wrap">
      <button class="social-peek-btn gratis-float-btn" onclick="openGratisPaket()" aria-label="5 Tools gratis sichern"><span class="social-peek-tooltip gratis-float-tip">5 Tools gratis sichern<span class="social-peek-tooltip-arrow"></span></span><i class="fas fa-gift"></i></button>
    </div>
    <a href="https://www.facebook.com/profile.php?id=61565584784878" target="_blank" rel="noopener" class="social-peek-btn social-peek-fb" aria-label="Facebook"><span class="social-peek-tooltip">Auf Facebook folgen<span class="social-peek-tooltip-arrow"></span></span><i class="fab fa-facebook-f"></i></a>
    <a href="https://www.instagram.com/daniel.eck.versicherungsmakler/" target="_blank" rel="noopener" class="social-peek-btn social-peek-ig" aria-label="Instagram"><span class="social-peek-tooltip">Auf Instagram folgen<span class="social-peek-tooltip-arrow"></span></span><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/491743225885" target="_blank" rel="noopener" class="social-peek-btn social-peek-wa" aria-label="WhatsApp"><span class="social-peek-tooltip">WhatsApp schreiben<span class="social-peek-tooltip-arrow"></span></span><i class="fab fa-whatsapp"></i></a>
  </div>
  <script>
  (function(){
    var p=document.getElementById('socialPeek');
    var gw=document.getElementById('gratisFloatWrap');
    if(!p)return;var l=window.pageYOffset;
    window.addEventListener('scroll',function(){
      var c=window.pageYOffset;
      if(gw){if(c>200){if(!gw.classList.contains('gratis-float-show')){gw.style.overflow='hidden';gw.classList.add('gratis-float-show');clearTimeout(gw._ot);gw._ot=setTimeout(function(){if(gw.classList.contains('gratis-float-show'))gw.style.overflow='visible';},600);}}else{clearTimeout(gw._ot);gw.style.overflow='hidden';gw.classList.remove('gratis-float-show');}}
      if(window.innerWidth>900){l=c;return;}
      if(c>l&&c>80){p.classList.add('is-peeked');}else{p.classList.remove('is-peeked');}
      l=c;
    },{passive:true});
  })();
  </script>
</body>
</html>
